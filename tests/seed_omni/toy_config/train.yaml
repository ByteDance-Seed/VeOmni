# Print-flow toy master YAML — graph vocabulary for test_print_flow.py.
#
# Uses print_modules stand-ins (text_encoder / vision / vqvae / ar), not real
# Janus weights.  Inference scenarios live in sibling infer_*.yaml files and
# overlay this vocabulary via OmniConfig.from_paths().

modules:
  text_encoder: {}
  vision: {}
  vqvae: {}
  ar: {}

nodes:
  tok_encode: { module: text_encoder.encode }
  tok_decode: { module: text_encoder.decode }
  vis_encode: { module: vision }
  vae_encode: { module: vqvae.encode }
  vae_decode: { module: vqvae.decode }
  run_ar: { module: ar }
  emit_image_start: { module: text_encoder.emit_image_start }
  emit_image_end: { module: text_encoder.emit_image_end }

edges:
  # ── training (and shared with inference) — topology-only; data flows via
  # the shared ``conversation_list`` dict carrier mutated by each module.
  vis_to_vae: { from: vis_encode, to: vae_encode }
  vae_to_tok: { from: vae_encode, to: tok_encode }
  tok_to_ar: { from: tok_encode, to: run_ar }
  ar_to_tok_dec: { from: run_ar, to: tok_decode }
  ar_to_vae_dec: { from: run_ar, to: vae_decode }
  tok_dec_sink: { from: tok_decode, to: end }
  vae_dec_sink: { from: vae_decode, to: end }
  # ── inference-only (topology-only; modules merge into ctx directly)
  vis_to_ar: { from: vis_encode, to: run_ar }
  vae_dec_to_ar: { from: vae_decode, to: run_ar }
  emit_start_to_ar: { from: emit_image_start, to: run_ar }
  emit_end_to_ar: { from: emit_image_end, to: run_ar }
  emit_start_sink: { from: emit_image_start, to: end }
  emit_end_sink: { from: emit_image_end, to: end }
  ar_run_sink: { from: run_ar, to: end }

training_graph:
  edges:
    - vis_to_vae
    - vae_to_tok
    - tok_to_ar
    - ar_to_tok_dec
    - ar_to_vae_dec
    - tok_dec_sink
    - vae_dec_sink
