# Understanding / VQA FSM for print-flow tests (mirrors janus infer_und.yaml shape).

generation_graph:
  initial: prompt_to_text
  states:
    prompt_to_text:
      body: [vis_to_ar, tok_to_ar, ar_to_tok_dec, tok_dec_sink]
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: default }, next_state: text_ar }

    text_ar:
      body: [tok_to_ar, ar_to_tok_dec, tok_dec_sink]
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }
