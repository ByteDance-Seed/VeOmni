name: bagel
seed: 7

reference:
  hf_model:
    module: tests.seed_omni.bagel.parity.reference.hf_model:BagelHfModelReference
    checkpoint: /mnt/hdfs/user_dir/veomni_omni/models/transformers/BAGEL-7B-MoT
  hf_module:
    - text_encoder
    - siglip_navit
    - vae
    - flow_connector_embed
    - qwen2_mot

v2_model:
  model_root: /mnt/hdfs/user_dir/veomni_omni/models/seed_omni/BAGEL-7B-MoT
  hf_model:
    config_dir: configs/seed_omni/Bagel/bagel_7b_mot
  hf_module:
    text_encoder:
      config_dir: tests/seed_omni/bagel/parity/configs/text_encoder
    siglip_navit:
      config_dir: tests/seed_omni/bagel/parity/configs/siglip_navit
    vae:
      config_dir: tests/seed_omni/bagel/parity/configs/vae
    flow_connector_embed:
      config_dir: tests/seed_omni/bagel/parity/configs/flow_connector
    qwen2_mot:
      config_dir: tests/seed_omni/bagel/parity/configs/qwen2_mot

tiers:
  reference: false
  graph: true
  module: true
  framework: true

gate:
  requires_parity_env: false
  requires_cuda: true
  requires_reference_capture: true
  requires_reference_checkpoint: false
  requires_v2_model: false

tolerance:
  exact:
    kind: exact
  tensor:
    rtol: 0.0
    atol: 0.0
  vision:
    rtol: 1.0e-6
    atol: 1.0e-5
  loss:
    rtol: 1.0e-6
    atol: 1.0e-6

launcher:
  enable_parallel: true
  max_cuda_devices: 8
