infer_interleave_text_image_then_gen:
  - stimulus:
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 512
            height: 512
        - type: text
          role: user
          value:
            kind: text
            text: "Describe the image briefly, then make it brighter."
      generation_kwargs:
        infer_mode: gen
        image_height: 512
        image_width: 512
        image_shapes: [512, 512]
        num_timesteps: 4
        timestep_shift: 3.0
        max_new_tokens: 23
        max_think_token_n: 1
        think: false
        do_sample: false
        cfg_text_scale: 4.0
        cfg_img_scale: 1.5
        cfg_interval: [0.0, 1.0]
        cfg_renorm_min: 0.0
        cfg_renorm_type: text_channel
    reference:
      oracle: hf_model
      kind: infer_interleave
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
    runs:
      graph:
        - id: denoise_multistep_cfg_text_img
          options:
            max_tensor_numel: 4000000
          probes:
            - infer_gen.timestep_all
            - infer_gen.latent_query_all
            - infer_gen.denoise_hidden_all
            - infer_gen.merged_velocity_all
