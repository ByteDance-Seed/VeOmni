text_only_prefill:
  - stimulus:
      conversation_list:
        - type: text
          role: user
          value: "Describe yourself in one short sentence."
      generation_kwargs:
        max_new_tokens: 1
        do_sample: false
        temperature: 0.0
        top_p: 1.0
    reference:
      oracle: hf_model
      kind: infer_und
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    runs:
      graph:
        - id: prompt_prefill
          probes:
            - infer_und.prompt_input_ids
            - infer_und.mot_prefill_hidden

text_image_prefill:
  - stimulus:
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 560
            height: 560
        - type: text
          role: user
          value: "What is the dominant visual pattern in this image?"
      generation_kwargs:
        max_new_tokens: 1
        do_sample: false
        temperature: 0.0
        top_p: 1.0
    reference:
      oracle: hf_model
      kind: infer_und
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    runs:
      graph:
        - id: prompt_prefill
          probes:
            - infer_und.prompt_input_ids
            - infer_und.mot_prefill_hidden

module_text_encoder_prompt:
  - stimulus:
      conversation_list:
        - type: text
