module_siglip_image_prompt:
  - stimulus:
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 560
            height: 560
      generation_kwargs:
        max_new_tokens: 1
        do_sample: false
        temperature: 0.0
        top_p: 1.0
    reference:
      oracle: hf_module.siglip_navit
      kind: infer_und
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    runs:
      module:
        - id: image_encode
          options:
            max_tensor_numel: 6000000
          probes:
            - infer_und.vision_embeds

module_qwen2_mot_text_prefill:
