image_text_edit_cfg_disabled:
  - stimulus:
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 512
            height: 512
        - type: text
          role: user
          value: "make the image brighter"
      generation_kwargs:
        image_height: 512
        image_width: 512
        image_shapes: [512, 512]
        num_timesteps: 2
        timestep_shift: 3.0
        max_new_tokens: 8
        max_think_token_n: 1
        think: false
        do_sample: false
        cfg_text_scale: 1.0
        cfg_img_scale: 1.0
    reference:
      oracle: hf_model
      kind: infer_edit
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
    runs:
      graph:
        - id: denoise_one_step
          options:
            max_tensor_numel: 4000000
          probes:
            - infer_gen.timestep
            - infer_gen.latent_query
            - infer_gen.denoise_hidden
            - infer_gen.velocity

