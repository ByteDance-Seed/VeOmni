train_ce:
  - graph: train
    stimulus:
      loss_mode: ce
      conversation_list:
        - type: text
          role: assistant
          value: "Describe BAGEL in one short sentence."
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.grad_lm_head_rows

train_ce_mse:
  - graph: train
    stimulus:
      loss_mode: ce_mse
      image_size: 512
      conversation_list:
        - type: text
          role: assistant
          value: "Describe BAGEL in one short sentence."
        - type: image
          role: assistant
          value:
            kind: image
            width: 512
            height: 512
          meta:
            timestep:
              kind: linspace
              start: -0.5
              end: 0.5
              steps: 1024
              transform: sigmoid
            noise:
              kind: linspace
              start: -0.25
              end: 0.25
              steps: 65536
              shape: [1024, 64]
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.mse_loss
            - train.grad_lm_head_rows
            - train.grad_early_q_proj
            - train.grad_gen_q_proj
            - train.grad_llm2vae
      framework:
        - id: train_step_optimizer_scheduler
          kind: train_step
          gate:
            requires_reference_capture: false
            requires_reference_checkpoint: false
          options:
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            checks:
              - optimizer_scheduler
        - id: checkpoint_resume
          kind: checkpoint_resume
          gate:
            requires_reference_capture: false
            requires_reference_checkpoint: false
          options:
            lr: 1.0e-4
            max_grad_norm: 1.0e9
        - id: fsdp2_numeric
          kind: distributed_train
          gate:
            requires_reference_capture: false
            requires_reference_checkpoint: false
            min_cuda_devices: 2
          options:
            strategy: fsdp2
            compare_direct: true
            nproc_per_node: 2
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900
        - id: fsdp2_8rank_numeric
          kind: distributed_train
          gate:
            requires_reference_capture: false
            requires_reference_checkpoint: false
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            compare_direct: false
            collect_parameter_samples: true
            nproc_per_node: 8
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900

  - graph: train
    data:
      data_type: seedomni
      train_path:
        sources:
          - /mnt/hdfs/user_dir/dataset/imagenet1k_train
          - /mnt/hdfs/veomni/datasets/tulu-3-sft-mixture/data
          - /mnt/hdfs/veomni/datasets/sharegpt4v_cap_100k
        names:
          - imagenet1k
          - tulu-3-sft-mixture
          - sharegpt4v_cap_100k
        schedule:
          - schedule_type: const
            weights: [0.5, 0.2, 0.3]
        level: token
        stopping_strategy: all_exhausted
        upstream_sharded: true
      datasets_type: iterable
      multisource_datasets_type: veomni_weighted_multisource
      max_seq_len: 1024
    reference:
      oracle: hf_model
    runs:
      framework:
        - id: fsdp2_8rank_10step_data_loss_mixed_gc
          kind: data_loss_smoke
          enable: false
          gate:
            requires_reference_capture: false
            requires_reference_checkpoint: false
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            nproc_per_node: 8
            steps: 10
            gradient_checkpointing: true
            expect_loss_decrease: false
            loss_window: 5
            timeout: 1800
            debug_log: false

train_text_image_ce:
  - graph: train
    stimulus:
      loss_mode: text_image_ce
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 224
            height: 224
        - type: text
          role: assistant
          value: "Describe BAGEL in one short sentence."
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.grad_lm_head_rows
            - train.grad_early_q_proj
            - train.grad_siglip_q_proj
