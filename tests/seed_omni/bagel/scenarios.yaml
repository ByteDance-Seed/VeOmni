scenarios:
  train_ce_mse_one_step:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      timestep_shift: 3.0
    probes:
      - train.ce_loss
      - train.mse_loss
      - train.grad_early_q_proj
      - train.grad_gen_q_proj
      - train.grad_lm_head_rows
      - train.grad_llm2vae
    tiers:
      - graph
      - module
      - framework
  train_framework_optimizer_scheduler:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      timestep_shift: 3.0
    framework:
      kind: trainer_step
      lr: 1.0e-4
      max_grad_norm: 1.0e9
      require_active_clip: false
    tiers:
      - framework
  train_framework_active_clipping:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      timestep_shift: 3.0
    framework:
      kind: trainer_step
      lr: 1.0e-4
      max_grad_norm: 1.0
      require_active_clip: true
    tiers:
      - framework
  train_ce_only_one_step:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      loss_mode: ce_only
      timestep_shift: 3.0
    probes:
      - train.ce_loss
      - train.grad_early_q_proj
      - train.grad_lm_head_rows
    tiers:
      - graph
      - module
      - framework
  train_text_image_ce_one_step:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      loss_mode: text_image_ce
      timestep_shift: 3.0
    probes:
      - train.ce_loss
      - train.grad_early_q_proj
      - train.grad_lm_head_rows
      - train.grad_siglip_q_proj
    tiers:
      - graph
      - module
      - framework
  train_mse_only_one_step:
    graph: train
    driver_case: train_ce_mse
    stimulus:
      prompt: "Describe BAGEL in one short sentence."
      loss_mode: mse_only
      timestep_shift: 3.0
    probes:
      - train.mse_loss
      - train.grad_gen_q_proj
      - train.grad_llm2vae
    tiers:
      - graph
      - module
      - framework
  infer_text_only_one_step:
    graph: infer_und
    driver_case: text_und
    stimulus:
      prompt: "Write a short description of a calm lake at sunrise."
      max_new_tokens: 1
      do_sample: false
    probes:
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_text_image_und_one_step:
    graph: infer_und
    driver_case: text_image_und
    stimulus:
      prompt: "Describe the colors and layout of this synthetic image in one sentence."
      image_width: 448
      image_height: 336
      max_new_tokens: 1
      do_sample: false
    probes:
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_text_image_raw_und_one_step:
    graph: infer_und
    driver_case: text_image_und
    stimulus:
      prompt: "Describe the colors and layout of this synthetic image in one sentence."
      image_width: 448
      image_height: 336
      use_raw_image: true
      max_new_tokens: 1
      do_sample: false
    probes:
      - image.image_embeds_sample
      - image.preprocessed_image_size
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_siglip_navit.generate]
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_image_gen_one_step:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A small ceramic teapot on a wooden table, soft morning light."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 1024
      image_width: 1024
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.latent_embeds_sample
      - image.packed_sequence_sample
      - image.hidden_sample
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_gen_wide_one_step:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A panoramic watercolor view of a quiet beach at dusk."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 768
      image_width: 1344
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.latent_embeds_sample
      - image.packed_sequence_sample
      - image.hidden_sample
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_gen_cfg_text_one_step:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A tiny red robot painting flowers in a quiet studio."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.base_velocity
      - image.cfg_text_hidden_sample
      - image.cfg_text_velocity
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_gen_cfg_image_one_step:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A blue glass owl sitting beside a candle."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.base_velocity
      - image.cfg_text_hidden_sample
      - image.cfg_img_hidden_sample
      - image.cfg_text_velocity
      - image.cfg_img_velocity
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_gen_cfg_renorm_one_step:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A paper boat floating through a neon canal."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.8
      cfg_renorm_type: channel
      enable_taylorseer: false
    probes:
      - image.base_velocity
      - image.cfg_text_velocity
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_gen_multi_step_three_steps:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A silver toy train crossing a small wooden bridge."
      max_new_tokens: 6
      max_flow_steps: 3
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.velocity
      - image.x_t
    module_policy:
      max_steps: 8
    tiers:
      - graph
      - module
  infer_image_gen_decode_smoke:
    graph: infer_gen
    driver_case: image_gen
    stimulus:
      prompt: "A small clay house under a clear sky."
      max_new_tokens: 6
      max_flow_steps: 2
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
      enable_decode_smoke: true
    probes:
      - image.generated_image_count
      - image.generated_image_size
    module_policy:
      max_steps: 8
    tiers:
      - graph
      - module
  infer_image_edit_one_step:
    graph: infer_edit
    driver_case: image_edit
    stimulus:
      prompt: "Turn the scene into a clean watercolor illustration."
      input_width: 384
      input_height: 256
      max_new_tokens: 3
      max_flow_steps: 1
      num_timesteps: 50
      timestep_shift: 3.0
      enable_vae_context: true
      enable_taylorseer: false
    probes:
      - image.image_embeds_sample
      - image.vae_context_latents
      - image.vae_context_latent_embeds_sample
      - image.vae_context_packed_sequence_sample
      - image.latent_embeds_sample
      - image.packed_sequence_sample
      - image.hidden_sample
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
  infer_image_edit_text_branch_one_step:
    graph: infer_edit
    driver_case: text_und
    stimulus:
      prompt: "Answer with one short sentence before any image edit starts."
      infer_mode: und
      max_new_tokens: 1
      do_sample: false
    probes:
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_interleave_text_one_step:
    graph: infer_interleave
    driver_case: text_und
    stimulus:
      prompt: "Write one concise sentence about a mountain path after rain."
      max_new_tokens: 1
      do_sample: false
    probes:
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_interleave_text_image_und_one_step:
    graph: infer_interleave
    driver_case: text_image_und
    stimulus:
      prompt: "Describe this synthetic image as part of an interleaved response."
      image_width: 448
      image_height: 336
      max_new_tokens: 1
      do_sample: false
    probes:
      - text.hidden
      - text.logits
      - text.greedy_token
    module_policy:
      required_nodes:
        - [prompt_encode, bagel_qwen2_mot.generate]
        - [prompt_encode, bagel_text_encoder.token_generate]
    tiers:
      - graph
      - module
  infer_interleave_image_span_one_step:
    graph: infer_interleave
    driver_case: image_gen
    stimulus:
      prompt: "A glass greenhouse filled with tiny orange trees."
      infer_mode: gen
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 1024
      image_width: 1024
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    probes:
      - image.latent_embeds_sample
      - image.packed_sequence_sample
      - image.hidden_sample
      - image.velocity
      - image.x_t
    module_policy:
      required_nodes:
        - [image_flow, bagel_flow_connector.decode_velocity]
    tiers:
      - graph
      - module
