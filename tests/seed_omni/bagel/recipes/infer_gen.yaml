text_only_t2i_cfg_disabled:
  - stimulus:
      conversation_list:
        - type: text
          role: user
          value:
            kind: text
            text: "a red square"
      generation_kwargs:
        image_height: 64
        image_width: 64
        image_shapes: [64, 64]
        num_timesteps: 2
        timestep_shift: 3.0
        max_new_tokens: 8
        max_think_token_n: 1
        think: false
        do_sample: false
        cfg_text_scale: 1.0
        cfg_img_scale: 1.0
    reference:
      oracle: hf_model
      kind: infer_gen
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    runs:
      graph:
        - id: denoise_one_step
          probes:
            - infer_gen.timestep
            - infer_gen.latent_query
            - infer_gen.denoise_hidden
            - infer_gen.velocity

