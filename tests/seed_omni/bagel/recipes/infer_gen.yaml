image_gen:
  - stimulus:
      prompt: "A small ceramic teapot on a wooden table, soft morning light."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 1024
      image_width: 1024
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    runs:
      graph:
        - id: base_one_step
          probes:
            - image.latent_embeds_sample
            - image.packed_sequence_sample
            - image.hidden_sample
            - image.velocity
            - image.x_t
      module:
        - id: base_one_step
          probes:
            - image.latent_embeds_sample
            - image.packed_sequence_sample
            - image.hidden_sample
            - image.velocity
            - image.x_t
          options:
            required_nodes:
              - [image_flow, bagel_flow_connector.decode_velocity]

  - stimulus:
      prompt: "A panoramic watercolor view of a quiet beach at dusk."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 768
      image_width: 1344
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    runs:
      graph:
        - id: wide_one_step
          probes:
            - image.latent_embeds_sample
            - image.packed_sequence_sample
            - image.hidden_sample
            - image.velocity
            - image.x_t
      module:
        - id: wide_one_step
          probes:
            - image.latent_embeds_sample
            - image.packed_sequence_sample
            - image.hidden_sample
            - image.velocity
            - image.x_t
          options:
            required_nodes:
              - [image_flow, bagel_flow_connector.decode_velocity]

  - stimulus:
      prompt: "A tiny red robot painting flowers in a quiet studio."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    runs:
      graph:
        - id: cfg_text_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_hidden_sample
            - image.cfg_text_velocity
            - image.velocity
            - image.x_t
      module:
        - id: cfg_text_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_hidden_sample
            - image.cfg_text_velocity
            - image.velocity
            - image.x_t
          options:
            required_nodes:
              - [image_flow, bagel_flow_connector.decode_velocity]

  - stimulus:
      prompt: "A blue glass owl sitting beside a candle."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    runs:
      graph:
        - id: cfg_image_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_hidden_sample
            - image.cfg_img_hidden_sample
            - image.cfg_text_velocity
            - image.cfg_img_velocity
            - image.velocity
            - image.x_t
      module:
        - id: cfg_image_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_hidden_sample
            - image.cfg_img_hidden_sample
            - image.cfg_text_velocity
            - image.cfg_img_velocity
            - image.velocity
            - image.x_t
          options:
            required_nodes:
              - [image_flow, bagel_flow_connector.decode_velocity]

  - stimulus:
      prompt: "A paper boat floating through a neon canal."
      max_new_tokens: 2
      max_flow_steps: 1
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.8
      cfg_renorm_type: channel
      enable_taylorseer: false
    runs:
      graph:
        - id: cfg_renorm_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_velocity
            - image.velocity
            - image.x_t
      module:
        - id: cfg_renorm_one_step
          probes:
            - image.base_velocity
            - image.cfg_text_velocity
            - image.velocity
            - image.x_t
          options:
            required_nodes:
              - [image_flow, bagel_flow_connector.decode_velocity]

  - stimulus:
      prompt: "A silver toy train crossing a small wooden bridge."
      max_new_tokens: 6
      max_flow_steps: 3
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
    runs:
      graph:
        - id: multi_step_three_steps
          probes:
            - image.velocity
            - image.x_t
      module:
        - id: multi_step_three_steps
          probes:
            - image.velocity
            - image.x_t
          options:
            max_steps: 8

  - stimulus:
      prompt: "A small clay house under a clear sky."
      max_new_tokens: 6
      max_flow_steps: 2
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 1.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
      enable_decode_smoke: true
    runs:
      graph:
        - id: base_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
      module:
        - id: base_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
          options:
            max_steps: 8

  - stimulus:
      prompt: "A tiny red robot painting flowers in a quiet studio."
      max_new_tokens: 6
      max_flow_steps: 2
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
      enable_decode_smoke: true
    runs:
      graph:
        - id: cfg_text_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
      module:
        - id: cfg_text_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
          options:
            max_steps: 8

  - stimulus:
      prompt: "A blue glass owl sitting beside a candle."
      max_new_tokens: 6
      max_flow_steps: 2
      image_height: 512
      image_width: 512
      latent_downsample: 16
      num_timesteps: 50
      timestep_shift: 3.0
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      cfg_interval: [0.0, 1.0]
      cfg_renorm_min: 0.0
      cfg_renorm_type: global
      enable_taylorseer: false
      enable_decode_smoke: true
    runs:
      graph:
        - id: cfg_image_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
      module:
        - id: cfg_image_decode_smoke
          probes:
            - image.generated_image_count
            - image.generated_image_size
          options:
            max_steps: 8
