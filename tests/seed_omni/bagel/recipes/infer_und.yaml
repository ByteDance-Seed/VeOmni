text_und:
  - stimulus:
      prompt: "Write a short description of a calm lake at sunrise."
      max_new_tokens: 1
      do_sample: false
    reference:
      kind: text_und
    runs:
      graph:
        - id: one_step
          probes:
            - text.hidden
            - text.logits
            - text.greedy_token
      module:
        - id: one_step
          probes:
            - text.hidden
            - text.logits
            - text.greedy_token

text_image_und:
  - stimulus:
      prompt: "Describe the colors and layout of this synthetic image in one sentence."
      image_width: 448
      image_height: 336
      max_new_tokens: 1
      do_sample: false
    reference:
      kind: text_image_und
    runs:
      graph:
        - id: prepared_one_step
          probes:
            - text.hidden
            - text.logits
            - text.greedy_token
      module:
        - id: prepared_one_step
          probes:
            - text.hidden
            - text.logits
            - text.greedy_token
  - stimulus:
      prompt: "Describe the colors and layout of this synthetic image in one sentence."
      image_width: 448
      image_height: 336
      use_raw_image: true
      max_new_tokens: 1
      do_sample: false
    reference:
      kind: text_image_und
    runs:
      graph:
        - id: raw_one_step
          probes:
            - image.image_embeds_sample
            - image.preprocessed_image_size
            - text.hidden
            - text.logits
            - text.greedy_token
      module:
        - id: raw_one_step
          probes:
            - image.image_embeds_sample
            - image.preprocessed_image_size
            - text.hidden
            - text.logits
            - text.greedy_token
