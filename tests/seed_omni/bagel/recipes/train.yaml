train_ce_mse:
  - stimulus:
      prompt: "Describe BAGEL in one short sentence."
      timestep_shift: 3.0
    reference:
      kind: train
      loss_mode: ce_mse
      options:
        visual_gen: true
        visual_und: false
    runs:
      graph:
        - id: one_step
          probes:
            - train.ce_loss
            - train.mse_loss
            - train.grad_early_q_proj
            - train.grad_gen_q_proj
            - train.grad_lm_head_rows
            - train.grad_llm2vae
      module:
        - id: one_step
          probes:
            - train.ce_loss
            - train.mse_loss
            - train.grad_early_q_proj
            - train.grad_gen_q_proj
            - train.grad_lm_head_rows
            - train.grad_llm2vae

  - stimulus:
      prompt: "Describe BAGEL in one short sentence."
      timestep_shift: 3.0
    reference:
      kind: train
      loss_mode: ce_mse
      options:
        visual_gen: true
        visual_und: false
    gate:
      requires_reference_capture: false
      requires_reference_checkpoint: false
    runs:
      framework:
        - id: train_step_optimizer_scheduler
          kind: train_step
          options:
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            checks:
              - optimizer_scheduler
        - id: train_step_active_clipping
          kind: train_step
          options:
            lr: 1.0e-4
            max_grad_norm: 1.0
            checks:
              - active_clipping
        - id: checkpoint_resume
          kind: checkpoint_resume
          options:
            lr: 1.0e-4
            max_grad_norm: 1.0e9
        - id: launcher
          kind: launcher
          options:
            launcher_path: tasks/omni/train_omni.py
        - id: optimizer_trajectory
          kind: optimizer_trajectory
          options:
            lr: 1.0e-4
            steps: 2
        - id: fsdp2
          kind: distributed_train
          gate:
            min_cuda_devices: 2
          options:
            strategy: fsdp2
            nproc_per_node: 2
            timeout: 900
        - id: fsdp2_numeric
          kind: distributed_train
          gate:
            min_cuda_devices: 2
          options:
            strategy: fsdp2
            compare_direct: true
            nproc_per_node: 2
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900
        - id: fsdp2_accum_numeric
          kind: distributed_train
          gate:
            min_cuda_devices: 2
          options:
            strategy: fsdp2
            compare_direct: true
            num_micro_steps: 2
            nproc_per_node: 2
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900
        - id: fsdp2_8rank_smoke
          kind: distributed_train
          gate:
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            nproc_per_node: 8
            timeout: 900
        - id: fsdp2_8rank_numeric
          kind: distributed_train
          gate:
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            compare_direct: true
            nproc_per_node: 8
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900
        - id: hsdp_4x2_smoke
          kind: distributed_train
          gate:
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            nproc_per_node: 8
            dp_shard_size: 4
            dp_replicate_size: 2
            timeout: 900
        - id: hsdp_4x2_numeric
          kind: distributed_train
          gate:
            min_cuda_devices: 8
          options:
            strategy: fsdp2
            compare_direct: true
            nproc_per_node: 8
            dp_shard_size: 4
            dp_replicate_size: 2
            lr: 1.0e-4
            max_grad_norm: 1.0e9
            timeout: 900

  - data:
      data_type: seedomni
      train_path:
        sources:
          - /mnt/hdfs/shizhelun/dataset/imagenet1k_train
          - /mnt/hdfs/veomni/datasets/tulu-3-sft-mixture/data
          - /mnt/hdfs/veomni/datasets/sharegpt4v_cap_100k
        names:
          - imagenet1k
          - tulu-3-sft-mixture
          - sharegpt4v_cap_100k
        schedule:
          - schedule_type: const
            weights: [0.5, 0.2, 0.3]
        level: token
        stopping_strategy: all_exhausted
        upstream_sharded: true
      datasets_type: iterable
      multisource_datasets_type: veomni_weighted_multisource
      max_seq_len: 1024
    reference:
      kind: train
      loss_mode: ce_mse
      options:
        visual_gen: true
        visual_und: false
    gate:
      requires_reference_capture: false
      requires_reference_checkpoint: false
      requires_cuda: true
      min_cuda_devices: 8
    runs:
      framework:
        - id: fsdp2_8rank_100step_data_loss_mixed_gc
          kind: data_loss_smoke
          options:
            strategy: fsdp2
            nproc_per_node: 8
            steps: 100
            gradient_checkpointing: true
            expect_loss_decrease: true
            loss_window: 10
            timeout: 7200

