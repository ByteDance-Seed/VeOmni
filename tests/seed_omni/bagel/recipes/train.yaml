train_ce:
  - graph: train
    stimulus:
      loss_mode: ce
      conversation_list:
        - type: text
          role: assistant
          value:
            kind: text
            text: "Describe BAGEL in one short sentence."
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.grad_lm_head_rows

train_ce_mse:
  - graph: train
    stimulus:
      loss_mode: ce_mse
      image_size: 32
      conversation_list:
        - type: text
          role: assistant
          value:
            kind: text
            text: "Describe BAGEL in one short sentence."
        - type: image
          role: assistant
          value:
            kind: image
            width: 32
            height: 32
          meta:
            timestep:
              kind: linspace
              start: -0.5
              end: 0.5
              steps: 4
              transform: sigmoid
            noise:
              kind: linspace
              start: -0.25
              end: 0.25
              steps: 256
              shape: [4, 64]
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_vae:
          device: cpu
          dtype: float32
          config:
            min_image_size: 32
            max_image_size: 32
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.mse_loss
            - train.grad_lm_head_rows
            - train.grad_early_q_proj
            - train.grad_gen_q_proj
            - train.grad_llm2vae

train_text_image_ce:
  - graph: train
    stimulus:
      loss_mode: text_image_ce
      image_size: 224
      conversation_list:
        - type: image
          role: user
          value:
            kind: image
            width: 224
            height: 224
        - type: text
          role: assistant
          value:
            kind: text
            text: "Describe BAGEL in one short sentence."
    reference:
      oracle: hf_model
    gate:
      requires_reference_checkpoint: true
      requires_v2_model: true
    v2_model:
      module_overrides:
        bagel_siglip_navit:
          config:
            image_size: 224
            min_image_size: 224
            max_pixels: 50176
    runs:
      graph:
        - id: forward_backward
          options:
            deterministic_sdpa: true
          probes:
            - train.ce_loss
            - train.grad_lm_head_rows
            - train.grad_early_q_proj
            - train.grad_siglip_q_proj
