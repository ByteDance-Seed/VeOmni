train.ce_loss:
  v2:
    node: bagel_text_encoder.decode
    field: loss
  ref:
    field: train_ce_loss
  tol: loss

train.grad_lm_head_rows:
  v2:
    node: bagel_text_encoder.decode
    field: train_grad_lm_head_rows
    grad:
      parameter: lm_head.weight
  ref:
    field: train_grad_lm_head_rows
  tol: gradient

train.grad_early_q_proj:
  v2:
    node: bagel_qwen2_mot.forward
    field: train_grad_early_q_proj
    grad:
      parameter: model.layers.0.self_attn.q_proj.weight
  ref:
    field: train_grad_early_q_proj
  tol: gradient

train.grad_gen_q_proj:
  v2:
    node: bagel_qwen2_mot.forward
    field: train_grad_gen_q_proj
    grad:
      parameter: model.layers.0.self_attn.q_proj_moe_gen.weight
  ref:
    field: train_grad_gen_q_proj
  tol: gradient

text.hidden:
  v2:
    node: bagel_qwen2_mot.generate
    state: prompt_encode
    field: bagel_last_hidden_state
  ref:
    field: hidden_state
  tol: hidden

image.hidden_sample:
  v2:
    node: bagel_qwen2_mot.generate
    state: image_flow
    field: bagel_last_hidden_state_sample
  ref:
    field: image_hidden_state_sample
  tol: hidden

text.logits:
  v2:
    node: bagel_text_encoder.token_generate
    state: prompt_encode
    field: bagel_last_logits
  ref:
    hook: model.language_model.lm_head
  tol: logits

text.greedy_token:
  v2:
    node: bagel_text_encoder.token_generate
    state: prompt_encode
    field: bagel_last_greedy_token
  ref:
    field: greedy_token
  tol: exact

train.grad_siglip_q_proj:
  v2:
    node: bagel_siglip_navit.forward
    field: train_grad_siglip_q_proj
    grad:
      parameter: vision_model.encoder.layers.0.self_attn.q_proj.weight
  ref:
    field: train_grad_siglip_q_proj
  tol: gradient

image.image_embeds_sample:
  v2:
    node: bagel_siglip_navit.generate
    state: prompt_encode
    field: bagel_last_image_embeds_sample
  ref:
    field: image_embeds_sample
  tol: hidden

image.preprocessed_image_size:
  v2:
    node: bagel_siglip_navit.generate
    state: prompt_encode
    field: bagel_preprocessed_image_size
  ref:
    field: preprocessed_image_size
  tol: exact

image.vae_context_latents:
  v2:
    node: bagel_vae.encode
    state: prompt_encode
    field: bagel_last_vae_context_latents
  ref:
    field: vae_context_latents
  tol: latent

image.generated_image_count:
  v2:
    node: bagel_vae.decode
    state: image_decode
    field: bagel_generated_image_count
  ref:
    field: generated_image_count
  tol: exact

image.generated_image_size:
  v2:
    node: bagel_vae.decode
    state: image_decode
    field: bagel_generated_image_size
  ref:
    field: generated_image_size
  tol: exact

image.vae_context_latent_embeds_sample:
  v2:
    node: bagel_flow_connector.embed_latent
    state: prompt_encode
    field: bagel_last_vae_context_latent_embeds_sample
  ref:
    field: vae_context_latent_embeds_sample
  tol: hidden

image.vae_context_packed_sequence_sample:
  v2:
    node: bagel_flow_connector.embed_latent
    state: prompt_encode
    field: bagel_last_vae_context_packed_sequence_sample
  ref:
    field: vae_context_packed_sequence_sample
  tol: hidden

image.latent_embeds_sample:
