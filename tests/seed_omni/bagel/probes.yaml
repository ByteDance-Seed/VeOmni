    node: bagel_flow_connector.embed_latent
    state: image_flow
    field: bagel_last_latent_embeds_sample
  ref:
    field: latent_embeds_sample
  tol: hidden

image.packed_sequence_sample:
  v2:
    node: bagel_flow_connector.embed_latent
    state: image_flow
    field: bagel_last_packed_sequence_sample
  ref:
    field: packed_sequence_sample
  tol: hidden

train.mse_loss:
  v2:
    node: bagel_flow_connector.decode_velocity
    field: loss
  ref:
    field: train_mse_loss
  tol: loss

train.grad_llm2vae:
  v2:
    node: bagel_flow_connector.decode_velocity
    field: train_grad_llm2vae
    grad:
      parameter: llm2vae.weight
  ref:
    field: train_grad_llm2vae
  tol: gradient

image.velocity:
