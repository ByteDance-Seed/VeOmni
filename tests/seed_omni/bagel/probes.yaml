    node: bagel_flow_connector.decode_velocity
    field: bagel_last_cfg_img_hidden_state_sample
  ref:
    field: cfg_img_hidden_state_sample
  tol: hidden

image.cfg_text_velocity:
  v2:
    node: bagel_flow_connector.decode_velocity
    field: bagel_last_cfg_text_velocity
  ref:
    field: cfg_text_velocity
  tol: velocity

image.cfg_img_velocity:
  v2:
    node: bagel_flow_connector.decode_velocity
    field: bagel_last_cfg_img_velocity
  ref:
