# =============================================================================
# LTX-2.3 Video-to-Video (IC-LoRA) Training Configuration
# =============================================================================
#
# Entry point: tasks/train_dit.py  (DiTTrainer + VeOmniDiTArguments)
# Usage: bash train.sh tasks/train_dit.py configs/dit/ltx2_v2v_ic_lora.yaml
#
# This configuration is for training In-Context LoRA (IC-LoRA) adapters that
# enable video-to-video transformations. IC-LoRA learns to apply visual
# transformations (e.g., depth-to-video, pose control, style transfer, etc.)
# by conditioning on reference videos.
#
# Key differences from text-to-video LoRA:
#   - Uses reference videos as conditioning input alongside text prompts
#   - Requires preprocessed reference latents in addition to target latents
#   - Validation requires reference videos to demonstrate the transformation
#
# Dataset structure for IC-LoRA training:
#   preprocessed_data_root/
#   ├── latents/           # Target video latents (what the model learns to generate)
#   ├── conditions/        # Text embeddings for each video
#   └── reference_latents/ # Reference video latents (conditioning input)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  # Path to the LTX-2.3 transformer weights
  model_path: "path/to/ltx-2.3-model.safetensors"

  # Path to the condition model (text encoder + scheduler + VAE)
  condition_model_path: "path/to/gemma-text-encoder"

  config_path: ./configs/model_configs/ltx2_3/ltx2_3_av.json

  # LoRA configuration — IC-LoRA uses explicit video-only modules
  lora_config:
    rank: 32
    alpha: 32
    dropout: 0.0
    # For IC-LoRA (video-only), we explicitly target video modules.
    # Including FFN layers often improves transformation quality.
    lora_modules:
      # Video self-attention
      - "attn1.to_k"
      - "attn1.to_q"
      - "attn1.to_v"
      - "attn1.to_out.0"
      # Video cross-attention
      - "attn2.to_k"
      - "attn2.to_q"
      - "attn2.to_v"
      - "attn2.to_out.0"
      # Video feed-forward (often improves transformation quality)
      - "ff.net.0.proj"
      - "ff.net.2"

  # LTX-2.3 has non-standard RoPE, pin to eager
  ops_implementation:
    rotary_pos_emb_implementation: eager

# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
data:
  # Path to preprocessed training data (required)
  # Should contain: latents/, conditions/, and reference_latents/ subdirectories
  train_path: "/path/to/preprocessed/data"

  data_type: diffusion
  datasets_type: iterable
  text_keys: text
  max_seq_len: 8192
  dataloader:
    type: native
    num_workers: 2
    drop_last: true

  mm_configs:
    # Strategy name: "video_to_video" for IC-LoRA training
    name: "video_to_video"
    # Probability of conditioning on the first frame during training
    first_frame_conditioning_p: 0.2
    # Directory name (within train_path) containing reference video latents
    # These are the conditioning inputs that guide the transformation
    reference_latents_dir: "reference_latents"
    # --- Flow matching ---
    timestep_sampling_mode: "shifted_logit_normal"

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
train:
  training_task: online_training

  global_batch_size: 8
  micro_batch_size: 1
  dyn_bsz: false

  init_device: meta
  seed: 42

  num_train_epochs: 1
  max_steps: 3000

  gradient_checkpointing:
    enable: true

  optimizer:
    type: adamw
    lr: 2.0e-4
    lr_decay_style: linear
    max_grad_norm: 1.0

  accelerator:
    ulysses_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
      mixed_precision:
        enable: true
        param_dtype: bfloat16
        cast_forward_inputs: false

  checkpoint:
    output_dir: "outputs/ltx2_v2v_ic_lora"
    save_steps: 250
    save_hf_weights: true

  wandb:
    enable: false
    project: "ltx2_v2v_ic_lora"

# --- NOTE: Fields below have NO direct VeOmni equivalent ---
#
# acceleration.quantization: null
# acceleration.load_text_encoder_in_8bit: false
# acceleration.offload_optimizer_during_validation: false
#
# validation.* (prompts, video_dims, reference_videos, guidance_scale, etc.)
#   (VeOmni's DiTTrainer does not have a validation config section.)
#
# hub.push_to_hub / hub.hub_model_id
#   (VeOmni does not have a Hub config section.)
#
# wandb.entity / wandb.tags / wandb.log_validation_videos
#   (VeOmni's WandbConfig only has: enable, project, name, id.)
#
# checkpoints.keep_last_n / checkpoints.precision
#   (VeOmni's CheckpointConfig does not have keep_last_n or precision fields.)