# =============================================================================
# LTX-2.3 Audio-Video LoRA Training Configuration
# =============================================================================
#
# Entry point: tasks/train_dit.py  (DiTTrainer + VeOmniDiTArguments)
# Usage: bash train.sh tasks/train_dit.py configs/dit/ltx2_av_lora.yaml
#
# This configuration is for training LoRA adapters on the LTX-2.3 model for
# text-to-video generation. It supports both video-only and joint audio-video
# training modes.
#
# Use this configuration when you want to:
#   - Fine-tune LTX-2.3 on your own video dataset
#   - Train with or without audio generation
#   - Create custom video generation styles or audiovisual concepts
#
# Dataset structure for text-to-video training:
#   preprocessed_data_root/
#   ├── latents/        # Video latents (VAE-encoded videos)
#   ├── conditions/     # Text embeddings for each video
#   └── audio_latents/  # Audio latents (only if with_audio: true)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
# model.* maps to DiTModelArguments (extends ModelArguments).
model:
  # Path to the LTX-2.3 transformer weights directory or .safetensors file
  # This should be a local path to your downloaded model
  model_path: "path/to/ltx-2.3-model.safetensors"

  # Path to the condition model config directory (contains config.json for
  # LTXVideoConditionModelConfig). The config's base_model_path should point
  # to the LTX-2.3 checkpoint (for loading EmbeddingsProcessor connector weights).
  condition_model_path: "path/to/ltx-2.3-checkpoint"

  config_path: "configs/model_configs/ltx2_3/ltx2_3_av.json"

  # Extra config passed to LTXVideoConditionModelConfig.from_pretrained()
  condition_model_cfg:
    # Path to the Gemma3 model (used only during precompute or online mode)
    gemma_model_path: "path/to/gemma3-model"
    # Whether to enable audio modality in the condition model
    with_audio: true

  # LoRA configuration — maps to model.lora_config (dict)
  # Presence of lora_config implicitly selects LoRA mode.
  lora_config:
    # Rank of the LoRA matrices (higher = more capacity but more parameters)
    # Typical values: 8, 16, 32, 64. Start with 32 for general fine-tuning.
    rank: 32

    # Alpha scaling factor (usually set equal to rank)
    # The effective scaling is alpha/rank, so alpha=rank means scaling of 1.0
    alpha: 32

    # Dropout probability for LoRA layers (0.0 = no dropout)
    # Can help with regularization if overfitting occurs
    dropout: 0.0

    # Which transformer modules to apply LoRA to (use "lora_modules" key)
    # The LTX-2.3 transformer has separate attention and FFN blocks for video and audio:
    #
    # VIDEO MODULES:
    #   - attn1.to_k, attn1.to_q, attn1.to_v, attn1.to_out.0  (video self-attention)
    #   - attn2.to_k, attn2.to_q, attn2.to_v, attn2.to_out.0  (video cross-attention to text)
    #   - ff.net.0.proj, ff.net.2                             (video feed-forward)
    #
    # AUDIO MODULES:
    #   - audio_attn1.to_k, audio_attn1.to_q, audio_attn1.to_v, audio_attn1.to_out.0
    #   - audio_attn2.to_k, audio_attn2.to_q, audio_attn2.to_v, audio_attn2.to_out.0
    #   - audio_ff.net.0.proj, audio_ff.net.2
    #
    # AUDIO-VIDEO CROSS-ATTENTION MODULES (for cross-modal interaction):
    #   - audio_to_video_attn.to_k, .to_q, .to_v, .to_out.0
    #   - video_to_audio_attn.to_k, .to_q, .to_v, .to_out.0
    #
    # Using short patterns like "to_k" matches ALL attention modules (video, audio, and cross-modal).
    # For audio-video training, this is the recommended approach.
    lora_modules:
      # Attention layers (matches both video and audio branches)
      - "to_k"
      - "to_q"
      - "to_v"
      - "to_out.0"
      # Uncomment below to also train feed-forward layers (can increase the LoRA's capacity):
      # - "ff.net.0.proj"
      # - "ff.net.2"
      # - "audio_ff.net.0.proj"
      # - "audio_ff.net.2"

  # LTX-2.3 has non-standard RoPE, pin to eager until a dedicated kernel exists
  ops_implementation:
    rotary_pos_emb_implementation: eager

# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
# data.* maps to DiTDataArguments (extends DataArguments).
data:
  # Path to preprocessed training data (required — no default)
  # Should contain: latents/, conditions/, and optionally audio_latents/
  train_path: "/path/to/preprocessed/data"

  data_type: diffusion
  datasets_type: iterable
  text_keys: text
  max_seq_len: 8192
  dataloader:
    type: native
    num_workers: 2
    drop_last: true

  # Model-specific configs passed to the data transform / condition model
  # These are the former "training_strategy" and "flow_matching" settings.
  mm_configs:
    # --- Training strategy ---
    # Strategy name: "text_to_video" for standard text-to-video training
    name: "text_to_video"
    # Probability of conditioning on the first frame during training
    first_frame_conditioning_p: 0.5
    # Enable joint audio-video training
    with_audio: true
    # Directory name (within train_path) containing audio latents
    audio_latents_dir: "audio_latents"
    # --- Flow matching ---
    timestep_sampling_mode: "shifted_logit_normal"

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
# train.* maps to DiTTrainingArguments (extends TrainingArguments).
# Note: DiTTrainer._setup() overrides dyn_bsz=False and micro_batch_size=1.
train:
  # DiT training task: "online_training" (default), "offline_training", or "offline_embedding"
  # Use "offline_training" with pre-computed Gemma features (recommended).
  # Run veomni/models/diffusers/ltx2_3/precompute_ltx2_gemma_features.py first to generate features.
  training_task: offline_training

  # DiT always uses fixed batch (dyn_bsz=False is forced in _setup).
  # global_batch_size = micro_batch_size(=1) * dp_size * gradient_accumulation_steps.
  # For 8 GPUs: global_batch_size=8 → effective grad_accum=1 per GPU.
  # For 1 GPU: global_batch_size=1 → no grad accumulation.
  # Adjust global_batch_size to match desired gradient_accumulation_steps.
  global_batch_size: 8
  micro_batch_size: 1
  dyn_bsz: false

  # Device for model init — "meta" required for FSDP2
  init_device: meta
  seed: 42

  num_train_epochs: 1
  max_steps: 2000

  # Gradient checkpointing — reduces memory at ~20-30% slower training
  gradient_checkpointing:
    enable: true

  # Optimizer settings
  optimizer:
    type: adamw
    lr: 1.0e-4
    lr_decay_style: linear
    max_grad_norm: 1.0

  # Parallelism & mixed precision
  accelerator:
    ulysses_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
      mixed_precision:
        enable: true
        param_dtype: bfloat16
        cast_forward_inputs: false

  # Checkpoint settings
  checkpoint:
    output_dir: "outputs/ltx2_av_lora"
    save_steps: 250
    save_hf_weights: true
    # Optional: resume from a previous checkpoint
    # load_path: "path/to/checkpoint"

  # W&B logging
  wandb:
    enable: false
    project: "ltx2_av_lora"

# --- NOTE: Fields below have NO direct VeOmni equivalent and are kept as
#     comments for reference. They need custom handling outside the YAML. ---
#
# acceleration.quantization: null
#   (VeOmni does not expose a top-level quantization config in YAML.)
# acceleration.load_text_encoder_in_8bit: false
# acceleration.offload_optimizer_during_validation: false
#
# validation.* (prompts, video_dims, guidance_scale, stg_scale, etc.)
#   (VeOmni's DiTTrainer does not have a validation config section.
#    Validation sampling is handled via separate inference scripts.)
#
# hub.push_to_hub: false / hub.hub_model_id: null
#   (VeOmni does not have a Hub config section.)
#
# wandb.entity / wandb.tags / wandb.log_validation_videos
#   (VeOmni's WandbConfig only has: enable, project, name, id.)
#
# checkpoints.keep_last_n / checkpoints.precision
#   (VeOmni's CheckpointConfig does not have keep_last_n or precision fields.)
