# Qwen3-30B-A3B (MoE) training DAG — pure text SFT.
#
# Flat list of edges; each endpoint is a self-describing `module[.method]`
# string (bare module -> `.forward`). Active nodes derived from endpoints:
#   qwen3_text_encoder.encode -> qwen3_moe_llm -> qwen3_text_encoder.decode -> end
training_graph:
  - { from: qwen3_text_encoder.encode, to: qwen3_moe_llm }
  - { from: qwen3_moe_llm,             to: qwen3_text_encoder.decode }
  - { from: qwen3_text_encoder.decode, to: end }
