# VeOmni training / inference config for OmniModel V2 — Qwen3-VL-2B-Instruct.
#
# Launch training (text + image + video understanding SFT):
#   bash train.sh tasks/omni/train_omni.py configs/seed_omni/Qwen/qwen3vl_2b/base.yaml
#
# Launch inference (image/video understanding):
#   python tasks/omni/infer_omni.py configs/seed_omni/Qwen/qwen3vl_2b/base.yaml \
#     --infer.infer_type understanding \
#     --infer.image /path/to/image.jpg \
#     --infer.prompt "What is in this image?" \
#     --infer.output_dir qwen3vl_out
#
# Prerequisite — split the upstream Qwen3-VL checkpoint:
#   python scripts/convert_model.py \
#     --model_path /mnt/hdfs/veomni/models/transformers/Qwen/Qwen3-VL-2B-Instruct \
#     --output_dir /mnt/hdfs/veomni/models/seed_omni/Qwen3-VL-2B-Instruct
#
# Produces three module sub-folders (qwen3vl_vision / qwen3vl_text_encoder /
# qwen3vl_llm) under model.model_path.

model:
  model_path: /mnt/hdfs/veomni/models/seed_omni/Qwen3-VL-2B-Instruct
  modules: configs/seed_omni/Qwen/qwen3vl_2b/modules_train.yaml
  train_graph: configs/seed_omni/Qwen/qwen3vl_2b/graph_train.yaml
  ops_implementation:
    attn_implementation: flash_attention_2

accelerator:
  fsdp_config:
    fsdp_mode: fsdp2
    full_shard: true
    reshard_after_forward: true
    reshard_after_backward: true
    forward_prefetch: true
    offload: false
    max_load_broadcast_size: 20.0
    mixed_precision:
      enable: true
      param_dtype: bfloat16
      reduce_dtype: float32
  offload_config:
    enable_activation: false
    activation_gpu_limit: 0.0

data:
  data_type: seedomni
  max_seq_len: 4096
  train_path: configs/seed_omni/Qwen/qwen3vl_2b/data.yaml
  datasets_type: iterable
  multisource_datasets_type: veomni_weighted_multisource
  train_sample: 1000000
  dataloader:
    type: native
    num_workers: 4
    drop_last: true
    pin_memory: true
    prefetch_factor: 2
  mm_configs:
    # Video frames are decoded without the audio track (Qwen3-VL has no audio
    # modality). fps / frame bounds keep the sampled clip small.
    use_audio_in_video: false
    fps: 2.0
    min_frames: 4
    max_frames: 8

train:
  seed: 42
  num_train_epochs: 1
  global_batch_size: 32
  micro_batch_size: 1
  init_device: meta
  dyn_bsz: false

  gradient_checkpointing:
    enable: true
    enable_reentrant: false

  optimizer:
    type: adamw
    lr: 1.0e-5
    lr_min: 1.0e-6
    lr_start: 0.0
    lr_warmup_ratio: 0.03
    lr_decay_style: cosine
    lr_decay_ratio: 1.0
    weight_decay: 0.01
    max_grad_norm: 1.0
    no_decay_params: []
    no_decay_modules: []

  checkpoint:
    output_dir: outputs/qwen3vl_2b_omni_sft
    save_steps: 500
    save_epochs: 0
    save_hf_weights: true
    hf_save_steps: 500
    hf_save_epochs: 0
  wandb:
    enable: true
    project: VeOmni_omni
    name: qwen3vl_2b_omni_sft

infer:
  infer_graph:
    vision_understanding: configs/seed_omni/Qwen/qwen3vl_2b/graph_infer.yaml
  infer_type: vision_understanding
  generation_kwargs:
    max_new_tokens: 2048
    temperature: 0.0
    top_p: 1.0
    do_sample: false
