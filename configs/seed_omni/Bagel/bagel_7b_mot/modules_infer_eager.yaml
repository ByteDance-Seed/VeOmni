# Per-module INFERENCE overrides for BAGEL-7B-MoT — all eager.
#
# Single-process load (`python tasks/omni/infer_omni.py ...`): every module
# loads via `from_pretrained(device_map='auto')`, spread across visible GPUs.

bagel_text_encoder:
  model:
    model_path: bagel_text_encoder
  accelerator:
    fsdp_config:
      fsdp_mode: eager

bagel_siglip_navit:
  model:
    model_path: bagel_siglip_navit
  accelerator:
    fsdp_config:
      fsdp_mode: eager

bagel_vae:
  model:
    model_path: bagel_vae
  accelerator:
    fsdp_config:
      fsdp_mode: eager

bagel_flow_connector:
  model:
    model_path: bagel_flow_connector
  accelerator:
    fsdp_config:
      fsdp_mode: eager

bagel_qwen2_mot:
  model:
    model_path: bagel_qwen2_mot
  accelerator:
    fsdp_config:
      fsdp_mode: eager
