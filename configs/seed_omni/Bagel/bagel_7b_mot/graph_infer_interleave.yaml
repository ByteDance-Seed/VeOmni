# BAGEL-7B-MoT inference - interleaved text and image generation.
generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - { from: bagel_text_encoder,                     to: bagel_qwen2_mot }
        - { from: bagel_vae.encode_context,               to: bagel_siglip_navit }
        - { from: bagel_siglip_navit,                     to: bagel_flow_connector.embed_context_latents }
        - { from: bagel_flow_connector.embed_context_latents, to: bagel_text_encoder.encode_image_markers }
        - { from: bagel_text_encoder.encode_image_markers, to: bagel_qwen2_mot }
        - { from: bagel_qwen2_mot,                        to: end }
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: query_denoise }
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: default }, next_state: text_ar }

    text_ar:
      body:
        - { from: bagel_qwen2_mot,    to: bagel_text_encoder }
        - { from: bagel_text_encoder, to: end }
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: query_denoise }
        - { condition: { type: module_signal, key: text_done }, next_state: done }

    query_denoise:
      body:
        - { from: bagel_flow_connector.prepare_denoise_query, to: bagel_text_encoder.encode_image_markers }
        - { from: bagel_text_encoder.encode_image_markers, to: bagel_qwen2_mot.run_denoise_branch }
        - { from: bagel_qwen2_mot.run_denoise_branch,      to: end }
      transitions:
        - { condition: { type: default }, next_state: velocity_collect }

    velocity_collect:
      body:
        - { from: bagel_flow_connector.decode_velocity_from_hidden, to: bagel_qwen2_mot.collect_velocity }
        - { from: bagel_qwen2_mot.collect_velocity,                 to: bagel_flow_connector.advance_denoise }
        - { from: bagel_flow_connector.advance_denoise,             to: end }
      transitions:
        - { condition: { type: module_signal, key: need_denoise_branch }, next_state: query_denoise }
        - { condition: { type: module_signal, key: image_complete }, next_state: image_decode }
        - { condition: { type: default }, next_state: query_denoise }

    image_decode:
      body:
        - { from: bagel_vae.decode_generated, to: end }
      transitions:
        - { condition: { type: default }, next_state: text_ar }

generation_kwargs:
  max_new_tokens: 2048
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  image_height: 1024
  image_width: 1024
  latent_downsample: 16
  num_timesteps: 50
  timestep_shift: 3.0
  cfg_text_scale: 1.0
  cfg_img_scale: 1.0
  cfg_interval: [0.0, 1.0]
  cfg_renorm_min: 0.0
  cfg_renorm_type: global
  enable_taylorseer: false
  enable_vae_context: false
