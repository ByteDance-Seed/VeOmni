sources:
  - /mnt/hdfs/user_dir/dataset/imagenet1k_train
  - /mnt/hdfs/veomni/datasets/tulu-3-sft-mixture/data
  - /mnt/hdfs/veomni/datasets/sharegpt4v_cap_100k
names:
  - imagenet1k
  - tulu-3-sft-mixture
  - sharegpt4v_cap_100k
schedule:
  - schedule_type: const
    weights: [0.5, 0.2, 0.3]
# Heterogeneous schemas (imagenet string / tulu dict / sharegpt4v list) — use
# VeOmni weighted multisource instead of HF interleave.
level: token
stopping_strategy: all_exhausted
upstream_sharded: true
