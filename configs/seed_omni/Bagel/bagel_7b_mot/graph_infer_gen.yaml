# BAGEL-7B-MoT inference - text to image.
generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - { from: bagel_text_encoder, to: bagel_qwen2_mot }
        - { from: bagel_qwen2_mot,    to: end }
      transitions:
        - { condition: { type: default }, next_state: denoise_query }

    denoise_query:
      body:
        - { from: bagel_flow_connector,                    to: bagel_text_encoder.encode_image_markers }
        - { from: bagel_text_encoder.encode_image_markers, to: bagel_qwen2_mot }
        - { from: bagel_qwen2_mot,                         to: end }
      transitions:
        - { condition: { type: default }, next_state: velocity_collect }

    velocity_collect:
      body:
        - { from: bagel_flow_connector, to: bagel_qwen2_mot }
        - { from: bagel_qwen2_mot,      to: end }
      transitions:
        - { condition: { type: module_signal, key: need_denoise_branch }, next_state: denoise_query }
        - { condition: { type: module_signal, key: velocity_ready },      next_state: denoise_advance }

    denoise_advance:
      body:
        - { from: bagel_flow_connector, to: end }
      transitions:
        - { condition: { type: module_signal, key: image_complete }, next_state: image_decode }
        - { condition: { type: default }, next_state: denoise_query }

    image_decode:
      body:
        - { from: bagel_vae.decode_generated, to: end }
      transitions:
        - { condition: { type: default }, next_state: done }

generation_kwargs:
  infer_mode: gen
  max_new_tokens: 2048
  image_height: 1024
  image_width: 1024
  latent_downsample: 16
  num_timesteps: 50
  timestep_shift: 3.0
  cfg_text_scale: 1.0
  cfg_img_scale: 1.0
  cfg_interval: [0.0, 1.0]
  cfg_renorm_min: 0.0
  cfg_renorm_type: global
  enable_taylorseer: false
