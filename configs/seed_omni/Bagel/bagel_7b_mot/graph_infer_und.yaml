# BAGEL-7B-MoT inference - understanding to text (text/image -> text).
generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - { from: bagel_siglip_navit,                to: bagel_qwen2_mot }
        - { from: bagel_text_encoder.prompt_encode,  to: bagel_qwen2_mot }
        - { from: bagel_qwen2_mot,                   to: bagel_text_encoder.token_generate }
        - { from: bagel_text_encoder.token_generate, to: end }
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: default }, next_state: text_ar }

    text_ar:
      body:
        - { from: bagel_qwen2_mot,                   to: bagel_text_encoder.token_generate }
        - { from: bagel_text_encoder.token_generate, to: end }
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }

generation_kwargs:
  max_new_tokens: 2048
  temperature: 0.0
  top_p: 1.0
  do_sample: false
