# Janus-1.3B SeedOmni V2 training launcher.
#
# Launch:
#   bash train.sh tasks/omni/train_omni.py configs/seed_omni/Janus/janus_1.3b/base.yaml
#
# Prerequisites:
#   python scripts/convert_model.py \
#     --model_path /mnt/hdfs/user_dir/veomni_omni/models/transformers/Janus-1.3B \
#     --output_dir /mnt/hdfs/user_dir/veomni_omni/models/seed_omni/Janus-1.3B
#
# See docs/seed_omni/example_models/janus.md for the full pipeline.

model:
  model_path: /mnt/hdfs/user_dir/veomni_omni/models/seed_omni/Janus-1.3B
  modules: configs/seed_omni/Janus/janus_1.3b/modules_train.yaml
  train_graph: configs/seed_omni/Janus/janus_1.3b/graph_train.yaml
  ops_implementation:
    attn_implementation: flash_attention_2

accelerator:
  fsdp_config:
    fsdp_mode: fsdp2
    full_shard: true
    reshard_after_forward: true
    reshard_after_backward: true
    forward_prefetch: true
    offload: false
    max_load_broadcast_size: 20.0
    mixed_precision:
      enable: true
      param_dtype: bfloat16
      reduce_dtype: float32
  offload_config:
    enable_activation: false
    activation_gpu_limit: 0.0


data:
  data_type: seedomni
  max_seq_len: 4096
  train_path: configs/seed_omni/Janus/data.yaml
  # Streaming + VeOmni weighted multisource: no HF schema merge across sources.
  datasets_type: iterable
  multisource_datasets_type: veomni_weighted_multisource
  # Iterable has no __len__; train_steps = ceil(train_sample / global_batch_size).
  train_sample: 1000000
  dataloader:
    type: native
    num_workers: 4
    drop_last: true
    pin_memory: true
    prefetch_factor: 2


train:
  seed: 42
  num_train_epochs: 1
  global_batch_size: 32
  micro_batch_size: 1
  init_device: meta
  dyn_bsz: false

  gradient_checkpointing:
    enable: true
    enable_reentrant: false

  optimizer:
    type: adamw
    lr: 1.0e-4
    lr_min: 1.0e-6
    lr_start: 0.0
    lr_warmup_ratio: 0.03
    lr_decay_style: cosine
    lr_decay_ratio: 1.0
    weight_decay: 0.01
    max_grad_norm: 1.0
    no_decay_params: []
    no_decay_modules: []

  checkpoint:
    output_dir: outputs/janus_1.3b_omni_sft
    save_steps: 500
    save_epochs: 0
    save_hf_weights: true
    hf_save_steps: 500
    hf_save_epochs: 0
  wandb:
    enable: true
    project: VeOmni_omni
    name: janus_1.3b_omni_sft

infer:
  model_path: /mnt/hdfs/user_dir/veomni_omni/models/seed_omni/Janus-1.3B
  modules: configs/seed_omni/Janus/janus_1.3b/modules_infer_eager.yaml
  # modules: configs/seed_omni/Janus/janus_1.3b/modules_infer_fsdp.yaml
  infer_graph:
    infer_gen: configs/seed_omni/Janus/janus_1.3b/graph_infer_gen.yaml
    infer_und: configs/seed_omni/Janus/janus_1.3b/graph_infer_und.yaml
    infer_interleave: configs/seed_omni/Janus/janus_1.3b/graph_infer_interleave.yaml
  infer_type: infer_interleave
  generation_kwargs:
    max_new_tokens: 2048
    temperature: 0.0
    top_p: 1.0
    do_sample: False
    guidance_scale: 5.0
