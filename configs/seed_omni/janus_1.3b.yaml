# OmniModel V2 — Janus-1.3B demo configuration
#
# Schema highlights (see design.md):
#   * `model_type` is NOT specified per-module — the trainer reads it from each
#     module's own `config.json` via HuggingFace AutoConfig.from_pretrained().
#   * `tokenizer_path` is the ONE global asset; all other processors live
#     inside their owning module's checkpoint subfolder.
#   * `nodes:` and `edges:` are independent pools sharing one namespace; each
#     name must be unique across both.
#   * Every node MUST appear on at least one edge — leaf nodes flow into the
#     reserved `end` keyword (virtual sink).  No orphans, no cycles.
#   * `training_graph.edges` lists only edge names; active nodes are *derived*
#     from those endpoints (excluding `end`).  Topological sort produces the
#     forward queue.
#   * `generation_graph.states.<name>.body` also lists only edge names.  Per-
#     iteration: walk body in order, execute each unique endpoint on first
#     encounter, route ctx[output]→ctx[as] along each edge.
#
# Split checkpoint first:
#   python scripts/split_janus.py \
#     --model_path /mnt/hdfs/veomni/models/transformers/Janus-1.3B \
#     --output_dir /mnt/hdfs/veomni/models/seed_omni/janus_1.3b
#
# Why a separate `text_embed` module?
# -----------------------------------
# The word-token embedding (`wte`) and the LM head are vocabulary-dependent
# layers that conceptually mirror a discrete-image VQ codec — they are the
# pre-stage and post-stage of the LLM backbone.  Pulling them out of
# `janus_llama` into a generic `text_embed` OmniModule lets the graph treat
# text and image symmetrically (both have `encode` / `decode` call-sites)
# and lets the LLM backbone be reused across vocab sizes.

# ── Global asset (the only one) ───────────────────────────────────────────────
tokenizer_path: /mnt/hdfs/veomni/models/seed_omni/janus_1.3b/tokenizer

# ── Module registry ───────────────────────────────────────────────────────────
modules:
  vision_encoder:
    weights_path: /mnt/hdfs/veomni/models/seed_omni/janus_1.3b/vision_encoder
    micro_batch_size: 4

  vqvae:
    weights_path: /mnt/hdfs/veomni/models/seed_omni/janus_1.3b/vqvae
    freeze_vqvae: true
    micro_batch_size: 4

  text_embed:
    weights_path: /mnt/hdfs/veomni/models/seed_omni/janus_1.3b/text_embed
    # vocab_size / hidden_size / tie_word_embeddings come from text_embed/config.json
    # (written by scripts/split_janus.py).  Janus uses an untied LLaMA head, so
    # encode and decode hold two separate parameter matrices.

  janus_llama:
    weights_path: /mnt/hdfs/veomni/models/seed_omni/janus_1.3b/janus_llama
    image_token_id: 100577      # <und_img> placeholder in tokenizer
    gen_image_token_id: 100578  # <gen_img> placeholder in tokenizer
    micro_batch_size: 2

# ── Graph nodes (call-sites) ──────────────────────────────────────────────────
nodes:
  vision_encode:                       # vision_encoder.forward
    module: vision_encoder

  vae_encode:                          # vqvae.encode: pixels → gen_embeds + vq_token_ids
    module: vqvae.encode

  vae_decode:                          # vqvae.decode — unified VQ head
    module: vqvae.decode               #   training:        hidden + gt_token_ids → _loss
                                       #   inference (FSM): hidden → sample → vq_token_id + embed
                                       #   inference (alt): token_id → embed (codebook lookup only)

  tok_encode:                          # text_embed.encode: input_ids → inputs_embeds (wte)
    module: text_embed.encode

  tok_decode:                          # text_embed.decode — unified text head
    module: text_embed.decode          #   training:  hidden_states + labels → _loss
                                       #   inference: hidden_states → sample → next token (input_ids)

  janus_llama:                         # janus_llama.forward (training) / .generate_step (FSM)
    module: janus_llama                # backbone — no wte, no lm_head — produces hidden_states

# ── Graph edges (data dependencies) ───────────────────────────────────────────
edges:
  # ── Training edges
  vision_to_ar:
    from: vision_encode
    output: image_embeds
    to: janus_llama
    as: und_image_embeds

  vae_enc_to_ar:
    from: vae_encode
    output: gen_embeds
    to: janus_llama
    as: gen_image_embeds

  tok_enc_to_ar:
    from: tok_encode
    output: inputs_embeds
    to: janus_llama
    as: inputs_embeds

  ar_to_tok_decode:
    from: janus_llama
    output: hidden_states
    to: tok_decode
    as: hidden_states

  ar_to_vae_decode:
    from: janus_llama
    output: hidden_states
    to: vae_decode
    as: hidden_states

  vae_token_to_decode:
    from: vae_encode
    output: vq_token_ids
    to: vae_decode
    as: gt_token_ids

  # Leaf-node sinks (no real downstream — virtual `end` keyword).
  tok_decode_sink:
    from: tok_decode
    to: end

  vae_decode_sink:
    from: vae_decode
    to: end

  # ── Inference-only feedback edge (cyclic; not in training subset).
  vae_decode_to_ar:
    from: vae_decode
    output: embed
    to: janus_llama
    as: inputs_embeds

# ── Training DAG ──────────────────────────────────────────────────────────────
# Default = Janus joint understanding + image-generation SFT.
#
# Active nodes are derived from these edges' endpoints (excluding `end`):
#   sources : vision_encode, vae_encode, tok_encode
#   middle  : janus_llama
#   sinks   : tok_decode, vae_decode  (both flow to `end`)
#
# Each module's `_loss` (single key per node, token-mean reduced inside the
# module) is summed by OmniModel:
#   vision_encode/_loss   — none (pure encoder)
#   vae_encode/_loss      — VQVAE embedding loss when vqvae unfrozen
#   janus_llama/_loss     — none (sees no labels; CE done in heads)
#   tok_decode/_loss      — text CE
#   vae_decode/_loss      — image-VQ CE
training_graph:
  edges:
    - vision_to_ar
    - vae_enc_to_ar
    - tok_enc_to_ar
    - ar_to_tok_decode
    - ar_to_vae_decode
    - vae_token_to_decode
    - tok_decode_sink
    - vae_decode_sink

# Alternative training scenarios (replace training_graph.edges to activate):
#
# A) Understanding-only SFT (no image generation)
#      edges: [vision_to_ar, tok_enc_to_ar, ar_to_tok_decode, tok_decode_sink]
#
# B) Generation-only SFT (skip vision understanding side)
#      edges: [vae_enc_to_ar, tok_enc_to_ar, ar_to_tok_decode, ar_to_vae_decode,
#              vae_token_to_decode, tok_decode_sink, vae_decode_sink]
#
# C) Train only janus_llama + text_embed with pre-cached image embeddings
#      edges: [tok_enc_to_ar, ar_to_tok_decode, tok_decode_sink]
#    Batch already carries und_image_embeds / gen_image_embeds from disk.

# ── Inference FSM ─────────────────────────────────────────────────────────────
# Each FSM iteration walks the body's edges in order; nodes execute on first
# encounter (default method `forward` → `generate_step`, otherwise direct
# dispatch).
generation_graph:
  initial: text_ar
  done_state: done

  states:
    text_ar:
      # tok_encode → janus_llama → tok_decode  (variable, until transition fires).
      # tok_decode writes input_ids/last_token_id back into ctx so the next
      # iteration's tok_encode reads them automatically.
      body:
        - tok_enc_to_ar      # tok_encode → janus_llama
        - ar_to_tok_decode   # janus_llama → tok_decode
      token_length:
        type: variable
      transitions:
        - condition:
            type: token_match
            token_id: 100577           # <und_img>: shouldn't appear during gen — self-loop
          next_state: text_ar
        - condition:
            type: token_match
            token_id: 100578           # <gen_img>: switch to VQ image generation
          next_state: image_vq
        - condition:
            type: token_match
            token_id: 2                # </s>
          next_state: done

    image_vq:
      # janus_llama → vae_decode → feedback loop into next iter's janus_llama.
      # 576 = 24 × 24 VQ grid.  vae_decode in inference mode samples from its
      # generation head AND looks up the codebook embedding in one call.
      body:
        - ar_to_vae_decode   # janus_llama → vae_decode
        - vae_decode_to_ar   # vae_decode.embed → next-iter janus_llama.inputs_embeds
      token_length:
        type: fixed
        value: 576
      transitions:
        - condition:
            type: steps_complete
          next_state: text_ar

    done:
      body: []
      token_length:
        type: fixed
        value: 0
      transitions: []
