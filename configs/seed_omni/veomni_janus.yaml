# VeOmni training config for OmniModel V2 — Janus-1.3B
#
# Launch:
#   bash train.sh tasks/train_omni.py configs/seed_omni/veomni_janus.yaml
#
# Prerequisites:
#   1. Split Janus checkpoint:
#      python scripts/split_janus.py \
#        --model_path /mnt/hdfs/veomni/models/transformers/Janus-1.3B \
#        --output_dir /mnt/hdfs/veomni/models/seed_omni/janus_1.3b
#
#   2. Ensure each module's weights_path in configs/seed_omni/janus_1.3b.yaml
#      points to the split sub-module directories above.

model:
  # Path to the OmniModel YAML that defines modules / connections / graphs.
  omni_config_path: configs/seed_omni/janus_1.3b.yaml

  # Tokenizer is the LLaMA tokenizer bundled with Janus.
  tokenizer_path: /mnt/hdfs/veomni/models/transformers/Janus-1.3B

  # basic_modules is merged with each sub-module's _no_split_modules for FSDP
  # sharding granularity.  Leave empty to rely solely on each module's own list.
  basic_modules: []

  # Per-module weights_path are configured inside janus_1.3b.yaml (modules.*).
  # Set model_path here only when you want to override all module weights at once
  # (e.g. resuming from a merged OmniModel checkpoint).
  model_path: null
  config_path: null

  model_config: {}
  ops_implementation:
    attn_implementation: flash_attention_2
    cross_entropy_loss_implementation: default

data:
  data_type: conversation
  text_keys: messages
  max_seq_len: 4096
  train_path: /mnt/hdfs/veomni/data/janus_sft
  train_sample: null
  train_size: null
  datasets_type: mapping
  chat_template: default
  dataloader:
    type: native
    num_workers: 4
    drop_last: true
    pin_memory: true
    prefetch_factor: 2

train:
  seed: 42
  num_train_epochs: 1
  global_batch_size: 32
  micro_batch_size: 2          # gradient-accumulation steps per train_step
  init_device: meta            # meta → weights loaded lazily by build_parallelize_model

  accelerator:
    # All sub-modules are parallelized with fsdp2.
    # Switch to "ddp" for single-GPU or small-scale debugging.
    dp_shard_size: -1           # -1 means use all available ranks
    dp_replicate_size: 1
    ulysses_size: 1             # set > 1 to enable SP for ar_llm (pre/post_forward auto-handles it)
    cp_size: 1
    tp_size: 1
    pp_size: 1
    fsdp_config:
      fsdp_mode: fsdp2
      full_shard: true
      reshard_after_forward: true
      reshard_after_backward: true
      forward_prefetch: true
      offload: false
      max_load_broadcast_size: 20.0
      mixed_precision:
        enable: true
        param_dtype: bfloat16
        reduce_dtype: float32
    offload_config:
      enable_activation: false
      activation_gpu_limit: 0.0

  gradient_checkpointing:
    enable: true
    enable_reentrant: false
    debug: false

  optimizer:
    type: adamw
    lr: 1.0e-4
    lr_min: 1.0e-6
    lr_start: 0.0
    lr_warmup_ratio: 0.03
    lr_decay_style: cosine
    lr_decay_ratio: 1.0
    weight_decay: 0.01
    max_grad_norm: 1.0
    no_decay_params: []
    no_decay_modules: []

  checkpoint:
    output_dir: /mnt/hdfs/veomni/checkpoints/janus_1.3b_omni
    load_path: null
    save_steps: 500
    save_epochs: 0
    manager: dcp
    save_hf_weights: false

  dyn_bsz: true
  dyn_bsz_runtime: main
  broadcast_model_weights_from_rank0: false  # false = parallel load from safetensors
  enable_batch_invariant_mode: false
  pad_to_length: false
  empty_cache_steps: 200
  gc_steps: 200

  wandb:
    enable: false
    project: VeOmni
    name: janus_omni
