# OmniModel V2 — Janus-1.3B master training YAML.
#
# This YAML defines the **vocabulary** the rest of the configs are built on:
#
#   * `modules`            — every OmniModule the framework needs to build.
#                            Each ``weights_path`` is relative to the split
#                            checkpoint root (``model.model_path`` in the
#                            launcher YAML) unless written as an absolute path.
#   * `nodes`              — every call-site (`module.method`) the graph
#                            engine can dispatch to, INCLUDING ones that
#                            only fire during inference (`emit_image_start`,
#                            `emit_image_end`).  Inference YAMLs reference
#                            these by name; they don't redeclare them.
#   * `edges`              — every data-routing edge available to either
#                            graph view (DAG / FSM).  Same rule as `nodes`:
#                            inference-only edges live here too.
#   * `training_graph`     — the active subset of `edges` for training; this
#                            file selects the **joint understanding +
#                            generation** SFT setup by default.
#
# The global tokenizer is **not** declared here — it is loaded from
# ``model.model_path`` in the launcher YAML (``veomni_janus.yaml``).
#
# For inference, the launcher YAML selects one of the sibling ``infer_*.yaml``
# files via ``model.omni_infer_type``; the selected file overlays its
# ``generation_graph`` onto this vocabulary.  See ``OmniConfig.from_paths``.
#
# Split the upstream Janus checkpoint first (creates the sub-folders
# referenced by relative ``modules.*.weights_path``)::
#
#   python scripts/multimodal/convert_model/split_janus.py \
#     --model_path /mnt/hdfs/veomni/models/transformers/Janus-1.3B \
#     --output_dir /mnt/hdfs/veomni/models/seed_omni/janus_1.3b
#
# Why a separate `text_encoder` (model_type=janus_text_encoder) module?
# -----------------------------------------------------------------
# * Word-token embedding (`wte`) and the LM head are vocabulary-dependent —
#   they conceptually mirror the discrete-image VQ codec on the text side.
#   Pulling them out of `janus_llama` lets the same graph treat text and
#   image symmetrically (both have `encode` / `decode` nodes).
# * Janus also needs to *emit* `<begin_of_image>` / `<end_of_image>`
#   boundary tokens around a VQ image span.  That knowledge is
#   model-specific (vocabulary IDs differ across model families), so the
#   `JanusTextEncoder` subclass adds two more call-site methods —
#   `emit_image_start` and `emit_image_end` — used by the inference
#   bridge states (`image_vq_start` / `image_vq_end`).  The framework FSM
#   has zero special-cased behaviour around boundary tokens.


# ── Module registry ───────────────────────────────────────────────────────────
# Module names match the registered HF model_type strings:
#   janus_siglip / janus_vqvae / janus_llama / janus_text_encoder
# At build-time the trainer resolves each ``weights_path`` against
# ``model.model_path`` from the launcher YAML (relative → subfolder,
# absolute → used as-is), then reads ``config.json`` → model_type →
# OMNI_MODEL_REGISTRY[model_type]().
modules:
  janus_siglip:
    weights_path: janus_siglip

  janus_vqvae:
    weights_path: janus_vqvae
    # Add a `model_config:` sub-block to override the module config, e.g.
    # `model_config: {freeze: false}` (defaults to True: freeze codec only).

  janus_text_encoder:
    weights_path: janus_text_encoder
    # `vocab_size` / `hidden_size` / `tie_word_embeddings` come from
    # `janus_text_encoder/config.json` (written by `scripts/split_janus.py`).
    # `begin_of_image_token_id` / `end_of_image_token_id` are resolved at
    # runtime from the module tokenizer (not stored in config.json).

  janus_llama:
    weights_path: janus_llama
    # `image_token_id` / `gen_image_token_id` are resolved at runtime from
    # the module tokenizer (not stored in config.json).

# NOTE: ``micro_batch_size`` / DP / SP / TP / CP knobs are **not** per-module
# in V2 — they live globally under ``train.*`` in the launcher YAML
# (e.g. ``configs/seed_omni/veomni_janus.yaml``).  Every module shares the
# same global micro_batch_size and the same parallel mesh.  Per-module
# parallel customisation will be revisited after the OmniTrainer build flow
# is fully working.

# ── Graph nodes (call-sites) ──────────────────────────────────────────────────
# The same module may back multiple nodes (different methods).  Inference-only
# nodes are declared here too — the training graph just doesn't activate them.
nodes:
  # ── Training & inference: shared
  siglip_encode: { module: janus_siglip }                   # forward (training) / generate_step (inference) — both alias to encode

  vae_encode: { module: janus_vqvae.encode }                # pixels → gen_embeds + vq_token_ids   (training)
  vae_decode: { module: janus_vqvae.decode }                # unified VQ head:
                                                            #   training:        hidden + gt_token_ids → _loss
                                                            #   inference (FSM): hidden → sample → vq_token_id + embed
                                                            #   inference (alt): token_id → embed (codebook lookup only)

  tok_encode: { module: janus_text_encoder.encode }                 # input_ids → inputs_embeds (wte)
  tok_decode: { module: janus_text_encoder.decode }                 # unified text head:
                                                            #   training:  hidden_states + labels → _loss
                                                            #   inference: hidden_states → sample → next token (input_ids)

  janus_llama: { module: janus_llama }                      # backbone — no wte, no lm_head

  # ── Inference-only: Janus-specific boundary-token emitters.
  emit_image_start: { module: janus_text_encoder.emit_image_start } # produces <begin_of_image> token
  emit_image_end:   { module: janus_text_encoder.emit_image_end }   # produces <end_of_image> token

  # ── Inference-only (conversation-list path).  Distinct nodes from the
  #    training-side encode/decode so the graph FSM dispatches to
  #    `<module>.generate` (the conversation-list-aware entry) rather than
  #    to the legacy training `encode` / `forward`.  Training still uses
  #    `siglip_encode` / `tok_encode` / `tok_decode` / `janus_llama` above.
  siglip_generate:     { module: janus_siglip.generate }                # writes inputs_embeds into image_und parts
  tok_encode_generate: { module: janus_text_encoder.generate }          # bos + tokenise text parts + tail-embed
  tok_ar_step:         { module: janus_text_encoder.ar_step }          # decode+encode+merge (text AR)
  janus_llama_gen:     { module: janus_llama.generate }                 # concat parts on prompt; tail-only on AR
  vae_generate:        { module: janus_vqvae.generate }                 # alias → ar_step (VQ decode+encode+merge)
  vae_ar_step:         { module: janus_vqvae.ar_step }                  # decode+encode+merge (VQ AR)

# ── Graph edges (data dependencies) ───────────────────────────────────────────
edges:
  # ── Training: the conversation_list carrier (D5 backbone splice).
  #
  # A single `conversation_list` object (a `TrainConversation`) is the ONLY
  # thing entering the backbone.  Each module fills its own segments' value
  # (= embedding) into it and `OmniModel.forward` writes the evolving carrier
  # back into the shared batch, so these chain edges are pure `{from, to}`
  # topology contracts — no `output`/`as` plumbing for the per-modality
  # fields (`input_ids` / `attention_mask` / `position_ids` / `gen_image_mask`
  # / `labels` / `vq_token_ids` no longer ride their own edges):
  #
  #   * siglip_encode  → fills carrier.und_embeds   (understanding patches)
  #   * vae_encode     → fills carrier.gen_embeds + gen_token_ids (VQ patches)
  #   * tok_encode     → chat-template + tokenise + wte + boi/eoi → carrier.segments
  #   * janus_llama    → segment-order splice → inputs_embeds; derives
  #                      attention_mask / position_ids; emits hidden_states
  #   * tok_decode / vae_decode → rebuild their labels from carrier.segments
  siglip_to_vae:  { from: siglip_encode, to: vae_encode }
  vae_to_tok:     { from: vae_encode,     to: tok_encode }
  tok_to_ar:      { from: tok_encode,     to: janus_llama }
  # Decode heads read ``TrainConversation.hidden_states`` from the carrier
  # (written by janus_llama.post_forward) — edges are topology-only.
  ar_to_tok_decode: { from: janus_llama, to: tok_decode }
  ar_to_vae_decode: { from: janus_llama, to: vae_decode }
  tok_decode_sink:  { from: tok_decode,  to: end }
  vae_decode_sink:  { from: vae_decode,  to: end }

  # ── Inference-only (cyclic; not in training subset).
  vae_decode_to_ar:    { from: vae_decode,    to: janus_llama }

  # ── Inference bridge edges: emit boundary token + feed it into the LLM.
  emit_start_to_ar:    { from: emit_image_start, to: janus_llama }
  emit_end_to_ar:      { from: emit_image_end,   to: janus_llama }
  emit_start_sink:     { from: emit_image_start, to: end }
  emit_end_sink:       { from: emit_image_end,   to: end }

  # ── Inference body sinks: trigger janus_llama as a body terminal in
  #    states where the LLM updates its KV cache without any downstream
  #    consumer in the same body (`image_vq_start`, `image_vq_end`,
  #    `prompt_to_image`).  In training the backbone already has real
  #    consumers (tok_decode / vae_decode), so this edge is unused
  #    there.  Same pattern as `tok_decode_sink` / `vae_decode_sink`.
  ar_run_sink:         { from: janus_llama, to: end }

  # ── Inference-only (conversation-list path).
  #    All edges below are topology-only — encoders mutate the shared
  #    ``conversation_list`` object in ``ctx``; later AR steps use
  #    ``input_ids`` / ``past_key_values`` / ``hidden_states`` directly.
  vision_to_llm:       { from: siglip_generate,     to: janus_llama_gen }
  tokenc_to_llm:       { from: tok_encode_generate, to: janus_llama_gen }
  llm_to_text_ar:      { from: janus_llama_gen,     to: tok_ar_step }
  text_ar_sink:        { from: tok_ar_step,         to: end }
  llm_to_vaegen:       { from: janus_llama_gen,     to: vae_ar_step }
  vaegen_to_llm:       { from: vae_ar_step,         to: janus_llama_gen }
  # Legacy training / test edges (pre-v2 conversation AR path).
  llm_to_tokdec:       { from: janus_llama_gen,     to: tok_decode }
  tokdec_to_llm:       { from: tok_decode,          to: janus_llama_gen }
  emit_start_to_llm:   { from: emit_image_start,    to: janus_llama_gen }
  emit_end_to_llm:     { from: emit_image_end,      to: janus_llama_gen }
  vaegen_sink:         { from: vae_ar_step,         to: end }
  llm_run_sink:        { from: janus_llama_gen, to: end }
  # Reuse the existing `tok_decode_sink` (declared above for the training
  # graph) and the existing `emit_*_sink` edges as the conversation-list
  # bodies' sinks — they pin the producing node into the active set
  # without routing any data, which is exactly what we need here too.

# ── Training DAG ──────────────────────────────────────────────────────────────
# Default = Janus joint understanding + image-generation SFT.
#
# The conversation_list carrier turns the graph into a chain (active nodes
# derived from the edge endpoints below, excluding `end`):
#
#   siglip_encode → vae_encode → tok_encode → janus_llama → tok_decode → end
#                                                        └─→ vae_decode → end
#
#   source : siglip_encode            (reads the raw conversation_list)
#   middle : vae_encode, tok_encode, janus_llama
#   sinks  : tok_decode, vae_decode   (both flow to `end`)
#
# siglip/vae/tok each fill their own segments' embedding into the single
# carrier (written back into the shared batch by OmniModel.forward); the
# backbone splices the segments and the heads rebuild their labels from the
# same segments.  Each module emits at most one `_loss` (token-mean over its
# own micro-batches); OmniModel.forward sums them.  See design.md §9.
#
# Training-side dummy forward
# ---------------------------
# Every active node MUST forward on every micro-batch, including ones where
# its primary input is missing (text-only sample → no pixel_values).  The
# vision / VQ modules feed a zero placeholder image so the encoder still runs;
# the backbone folds the full-batch und_embeds / gen_embeds into a
# `sum() * 0.0` autograd anchor so every encoder receives a (zero) gradient,
# keeping FSDP DP/SP graphs aligned across ranks.  This is the *only*
# asymmetry between training and inference: inference permits empty `{}`
# returns and lets edge routing skip silently.
training_graph:
  edges:
    - siglip_to_vae
    - vae_to_tok
    - tok_to_ar
    - ar_to_tok_decode
    - ar_to_vae_decode
    - tok_decode_sink
    - vae_decode_sink

# Alternative training scenarios: because every modality now flows through the
# single conversation_list carrier (siglip → vae → tok → llama), an
# understanding-only or generation-only subset is selected by what the data
# actually contains (text-only / image-only samples drive the zero-placeholder
# dummy path), not by dropping edges.  Keep the full chain; curate the dataset
# for the scenario you want.
