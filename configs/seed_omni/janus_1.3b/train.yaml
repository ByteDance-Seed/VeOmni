# OmniModel V2 — Janus-1.3B master training YAML.
#
# This YAML defines the **vocabulary** the rest of the configs are built on:
#
#   * `modules`            — every OmniModule the framework needs to build.
#                            Each block mirrors a mini ``VeOmniOmniArguments``
#                            (``model`` / ``train`` / ``data``).  Relative
#                            ``model.weights_path`` joins ``model.model_path``
#                            from the launcher YAML unless absolute.
#   * `nodes`              — every call-site (`module.method`) the graph
#                            engine can dispatch to, INCLUDING ones that
#                            only fire during inference (`emit_image_start`,
#                            `emit_image_end`).  Inference YAMLs reference
#                            these by name; they don't redeclare them.
#   * `edges`              — every data-routing edge available to either
#                            graph view (DAG / FSM).  Same rule as `nodes`:
#                            inference-only edges live here too.
#   * `training_graph`     — the active subset of `edges` for training; this
#                            file selects the **joint understanding +
#                            generation** SFT setup by default.
#
# The LLM tokenizer lives in ``janus_text_encoder/`` (split checkpoint asset).
#
# For inference, the launcher YAML selects one of the sibling ``infer_*.yaml``
# files via ``model.omni_infer_type``; the selected file overlays its
# ``generation_graph`` onto this vocabulary.  See ``OmniConfig._init``.
#
# Split the upstream Janus checkpoint first (creates the sub-folders
# referenced by relative ``modules.*.weights_path``)::
#
#   python scripts/multimodal/convert_model/split_janus.py \
#     --model_path /mnt/hdfs/veomni/models/transformers/Janus-1.3B \
#     --output_dir /mnt/hdfs/veomni/models/seed_omni/janus_1.3b
#
# Why a separate `text_encoder` (model_type=janus_text_encoder) module?
# -----------------------------------------------------------------
# * Word-token embedding (`wte`) and the LM head are vocabulary-dependent —
#   they conceptually mirror the discrete-image VQ codec on the text side.
#   Pulling them out of `janus_llama` lets the same graph treat text and
#   image symmetrically (both have `encode` / `decode` nodes).
# * Janus also needs to *emit* `<begin_of_image>` / `<end_of_image>`
#   boundary tokens around a VQ image span.  That knowledge is
#   model-specific (vocabulary IDs differ across model families), so the
#   `JanusTextEncoder` subclass adds two more call-site methods —
#   `emit_image_start` and `emit_image_end` — used by the inference
#   bridge states (`image_vq_start` / `image_vq_end`).  The framework FSM
#   has zero special-cased behaviour around boundary tokens.


# ── Module registry ───────────────────────────────────────────────────────────
# Module names match the registered HF model_type strings:
#   janus_siglip / janus_vqvae / janus_llama / janus_text_encoder
# At build-time the trainer resolves each ``weights_path`` against
# ``model.model_path`` from the launcher YAML (relative → subfolder,
# absolute → used as-is), then reads ``config.json`` → model_type →
# OMNI_MODEL_REGISTRY[model_type]().
modules:
  janus_siglip:
    model:
      model_path: janus_siglip

  janus_vqvae:
    model:
      model_path: janus_vqvae
    # Add ``model.model_config: {freeze: false}`` to override module config
    # (defaults to True: freeze codec only).

  janus_text_encoder:
    model:
      model_path: janus_text_encoder
    # `vocab_size` / `hidden_size` / `tie_word_embeddings` come from
    # `janus_text_encoder/config.json` (written by `scripts/split_janus.py`).
    # Tokenizer + special-token ids: ``janus_text_encoder/tokenizer.json``.

  janus_llama:
    model:
      model_path: janus_llama
    # `image_token_id` / `gen_image_token_id` are written into config.json at split time.

# NOTE: Training-time ``micro_batch_size`` / DP / SP / TP / CP live globally
# under ``train.*`` in the launcher YAML (e.g. ``veomni_janus.yaml``).  Every
# module shares the same training parallel mesh.
#
# At **inference** time, ``infer_*.yaml`` may deep-merge per-module overrides
# into this block — e.g. load ``janus_siglip`` with FSDP2::
#
#   modules:
#     janus_siglip:
#       train:
#         accelerator:
#           fsdp_config:
#             fsdp_mode: fsdp2
#
# Other modules default to eager ``from_pretrained(..., device_map='auto')``.
# Each module entry mirrors a mini ``VeOmniOmniArguments`` — ``model`` /
# ``train`` / ``data`` — parsed the same way as the launcher YAML via
# :func:`parse_args` / :func:`merge_args`.

# ── Graph nodes (call-sites) ──────────────────────────────────────────────────
# The same module may back multiple nodes (different methods).  Inference-only
# nodes are declared here too — the training graph just doesn't activate them.
nodes:
  # ── Training & inference: shared
  siglip_encode: { module: janus_siglip }                   # training: forward; inference: generate (FSM default)

  vqvae_encode: { module: janus_vqvae.encode }               # pixels → gen_embeds + vq_token_ids   (training)
  vqvae_decode: { module: janus_vqvae.decode }              # training CE head (hidden + gt_token_ids → _loss)
  vqvae:        { module: janus_vqvae }                      # training: forward; inference: generate

  token_encode:  { module: janus_text_encoder.encode }       # training: chat-template + wte
  token_generate: { module: janus_text_encoder }   # inference: embed conversation tail
  token_decode: { module: janus_text_encoder.decode }        # unified text head:
                                                              #   training:  hidden_states + labels → _loss
                                                              #   inference: hidden_states → sample → next token (input_ids)
  janus_llama: { module: janus_llama }                        # backbone — no wte, no lm_head

  # ── Inference-only: Janus-specific boundary-token emitters.
  emit_image_start: { module: janus_text_encoder.emit_image_start } # produces <begin_of_image> token
  emit_image_end:   { module: janus_text_encoder.emit_image_end }   # produces <end_of_image> token

# ── Graph edges (data dependencies) ───────────────────────────────────────────
edges:
  # ── Training: the conversation_list carrier (in-place embed mutation).
  #
  # Batched ``conversation_list`` (``list[list[ConversationItem]]``) is the
  # only thing entering the backbone.  Each module embeds its modality in
  # place on the items; ``OmniModel.forward`` writes the list back into the
  # shared batch.  Edges are pure ``{from, to}`` topology — no per-field routing.
  #
  #   * siglip_encode   → embeds user ``image`` items in place (no image → dummy tail)
  #   * vqvae_encode    → embeds assistant ``image`` items + ``meta.janus_vqvae_labels`` (no image → dummy tail)
  #   * token_encode    → chat-template tokenise + wte (text only; ignores images)
  #   * janus_llama     → splices item embeds → inputs_embeds; hidden_states → batch
  #   * token_decode / vqvae_decode → labels from ``meta.label_ids`` / ``meta.gen_ids``
  #
  # The three encoders fan in to ``janus_llama`` — execution order among them is
  # arbitrary; each module mutates disjoint ``conversation_list`` segments.
  siglip_to_janus_llama:          { from: siglip_encode,  to: janus_llama }
  vqvae_encode_to_janus_llama:    { from: vqvae_encode,  to: janus_llama }
  token_encode_to_janus_llama:    { from: token_encode,  to: janus_llama }   # training

  # Decode heads read ``hidden_states`` and ``conversation_list`` from the batch.
  janus_llama_to_token_decode:    { from: janus_llama, to: token_decode }  # training
  janus_llama_to_vqvae_decode:    { from: janus_llama, to: vqvae_decode }  # training CE only
  token_decode_sink:              { from: token_decode, to: end }
  vqvae_decode_sink:              { from: vqvae_decode, to: end }

  # ── Inference VQ AR loop: ``janus_llama`` tail-forward → ``vqvae.generate``
  #    per FSM step.  ``image_vq`` body order: ``janus_llama_to_vqvae`` then
  #    ``vqvae_to_janus_llama`` — the first llama forward on ``<boi>`` happens
  #    inside the loop (``image_vq_start`` only emits the token).
  janus_llama_to_vqvae:           { from: janus_llama, to: vqvae }
  vqvae_to_janus_llama:           { from: vqvae, to: janus_llama }
  token_generate_to_janus_llama:  { from: token_generate, to: janus_llama }
  janus_llama_to_token_generate:  { from: janus_llama, to: token_generate }
  token_generate_sink:            { from: token_generate, to: end }

  # ── Inference bridge edges: emit boundary tokens (with / without llama).
  emit_start_to_janus_llama:    { from: emit_image_start, to: janus_llama }
  emit_end_to_janus_llama:      { from: emit_image_end,   to: janus_llama }
  emit_start_sink:              { from: emit_image_start, to: end }
  emit_end_sink:                { from: emit_image_end,   to: end }

  # ── Inference body sinks: pin ``janus_llama`` into the active set when the
  #    backbone updates KV cache without a downstream consumer in the same body
  #    (`image_vq_start`, `image_vq_end`, `prompt_encode`).  Unused in training
  #    where ``janus_llama`` already has real consumers (token_decode / vqvae_decode).
  janus_llama_sink:             { from: janus_llama, to: end }

# ── Training DAG ──────────────────────────────────────────────────────────────
# Default = Janus joint understanding + image-generation SFT.
#
# Active nodes (derived from edge endpoints, excluding `end`):
#
#   {siglip_encode, vqvae_encode, token_encode} → janus_llama → token_decode → end
#                                                            └─→ vqvae_decode → end
#
#   sources: siglip_encode, vqvae_encode, token_encode  (order-free fan-in)
#   backbone: janus_llama
#   sinks  : token_decode, vqvae_decode
#
# siglip / vqvae / token each fill their own segments' embedding into the single
# carrier (written back into the shared batch by OmniModel.forward); the
# backbone splices the segments and the heads rebuild their labels from the
# same segments.  Each module emits at most one `_loss` (token-mean over its
# own micro-batches); OmniModel.forward sums them.  See design.md §9.
#
# Training-side dummy forward
# ---------------------------
# Every active node MUST forward on every micro-batch, including ones where
# its primary input is missing (text-only sample → no pixel_values).  The
# vision / VQ modules feed a zero placeholder image so the encoder still runs;
# the backbone folds the full-batch und_embeds / gen_embeds into a
# `sum() * 0.0` autograd anchor so every encoder receives a (zero) gradient,
# keeping FSDP DP/SP graphs aligned across ranks.  This is the *only*
# asymmetry between training and inference: inference permits empty `{}`
# returns and lets edge routing skip silently.
training_graph:
  edges:
    - siglip_to_janus_llama
    - vqvae_encode_to_janus_llama
    - token_encode_to_janus_llama
    - janus_llama_to_token_decode
    - janus_llama_to_vqvae_decode
    - token_decode_sink
    - vqvae_decode_sink

# Alternative training scenarios: because every modality now flows through the
# single conversation_list carrier (siglip / vqvae / token → llama in any order), an
# understanding-only or generation-only subset is selected by what the data
# actually contains (text-only / image-only samples drive the zero-placeholder
# dummy path), not by dropping edges.  Keep the full chain; curate the dataset
# for the scenario you want.
