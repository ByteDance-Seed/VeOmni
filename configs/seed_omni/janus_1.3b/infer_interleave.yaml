# Janus-1.3B inference — interleave T2T + T2I (mid-stream image generation).
#
# Unlike `infer_gen.yaml` (deterministic T2I), the model itself decides when
# to start an image: ``tok_ar_step`` samples normally and the image span opens
# only on a natural <begin_of_image> (`start_image_gen` signal).  After each
# image span ``image_vq_end`` falls back to ``text_ar`` (not ``done``).

generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - vision_to_llm
        - tokenc_to_llm
        - llm_to_text_ar
        - text_ar_sink
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: image_vq }
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: default }, next_state: text_ar }

    text_ar:
      body:
        - llm_to_text_ar
        - text_ar_sink
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: image_vq }
        - { condition: { type: module_signal, key: text_done }, next_state: done }

    image_vq:
      body:
        - llm_to_vaegen
        - vaegen_to_llm
      transitions:
        - { condition: { type: module_signal, key: image_complete }, next_state: image_vq_end }

    image_vq_end:
      body:
        - emit_end_sink
      transitions:
        - { condition: { type: default }, next_state: text_ar }
