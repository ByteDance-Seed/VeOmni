# Janus-1.3B inference — interleave T2T + T2I (mid-stream image generation).
#
# Same machinery as `infer_gen.yaml` for the image span; the only difference
# is that `image_vq_end` falls back to `text_ar` (not `done`) so the model
# keeps talking after each image.  Text continues until the LM emits
# <eos> (`text_done`) or another <begin_of_image> (`start_image_gen` →
# another image span).
#
# Flow
# ----
#   prompt_encode → text_ar     (force_image_gen=False, default path)
#                 → image_vq    (force_image_gen=True OR natural <boi>)
#   text_ar       → image_vq    on <boi>
#                 → done        on <eos>
#                 → text_ar     loop otherwise
#   image_vq      → image_vq_end  on `image_complete`
#   image_vq_end  → text_ar       (the one difference vs. infer_gen)

generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - vision_to_llm
        - tokenc_to_llm
        - llm_to_tokdec
        - tok_decode_sink
      token_length: { type: fixed, value: 1 }
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: image_vq }
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: steps_complete }, next_state: text_ar }

    text_ar:
      body:
        - tokenc_to_llm
        - llm_to_tokdec
        - tok_decode_sink
      token_length: { type: variable }
      transitions:
        - { condition: { type: module_signal, key: start_image_gen }, next_state: image_vq }
        - { condition: { type: module_signal, key: text_done }, next_state: done }

    image_vq:
      body:
        - llm_to_vaegen
        - vaegen_to_llm
      token_length: { type: variable }
      transitions:
        - { condition: { type: module_signal, key: image_complete }, next_state: image_vq_end }

    image_vq_end:
      # After eoi, fall back to text_ar so the model can keep speaking
      # (or emit eos / another <boi>).  The eoi part's `inputs_embeds`
      # is consumed by text_ar's first llama tail-only forward.
      body:
        - emit_end_sink
      token_length: { type: fixed, value: 1 }
      transitions:
        - { condition: { type: steps_complete }, next_state: text_ar }
