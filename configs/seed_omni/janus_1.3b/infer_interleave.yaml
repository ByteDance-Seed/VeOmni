# Janus-1.3B inference — interleave T2T + T2I (mid-stream image generation).
#
# Use::
#
#   OmniConfig.from_yamls(
#       "configs/seed_omni/janus_1.3b/train_joint.yaml",
#       "configs/seed_omni/janus_1.3b/infer_interleave.yaml",
#   )
#
# Flow
# ----
#   text_ar
#     ├─ token == </s>            → done
#     ├─ token == <begin_of_image> → image_vq_start
#     └─ otherwise                 → text_ar (continue)
#
#   image_vq_start (1 step: emit <begin_of_image> + feed into LLM, run AR once)
#     → image_vq
#
#   image_vq (576 fixed steps: AR → vae_decode.sample → feed embed back)
#     → image_vq_end
#
#   image_vq_end (1 step: emit <end_of_image> + feed into LLM, run AR once)
#     → text_ar
#
# Bridge states (`image_vq_start` / `image_vq_end`) own the boundary-token
# emission via `JanusTextEmbed.emit_image_start` / `emit_image_end`.  The
# framework FSM has no special-cased boundary logic — these are normal
# nodes that happen to produce a single fixed token.

generation_graph:
  initial: text_ar
  done_state: done

  states:
    text_ar:
      # tok_encode → janus_llama → tok_decode (variable, until transition fires).
      # tok_decode writes input_ids/last_token_id back into ctx so the next
      # iteration's tok_encode reads them automatically.
      body:
        - tok_enc_to_ar       # tok_encode  → janus_llama (inputs_embeds)
        - ar_to_tok_decode    # janus_llama → tok_decode  (hidden_states)
        - tok_decode_sink     # leaf
      token_length: { type: variable }
      transitions:
        - { condition: { type: token_match, token_id: 100016 }, next_state: image_vq_start }   # <begin_of_image>
        - { condition: { type: token_match, token_id: 100001 }, next_state: done }              # </s>

    image_vq_start:
      # Emit <begin_of_image>, feed it through janus_llama.  Single step:
      # the LLM produces hidden_states which the next state's first edge
      # (ar_to_vae_decode) consumes.  ar_run_sink is the body-terminal
      # marker that triggers janus_llama (which has no downstream node
      # in this body — its hidden_states is consumed by the *next*
      # state).
      body:
        - emit_start_to_ar    # emit_image_start (boi token) → janus_llama
        - emit_start_sink     # leaf — pin emit_image_start into the body
        - ar_run_sink         # leaf — triggers janus_llama (KV cache update)
      token_length: { type: fixed, value: 1 }
      transitions:
        - { condition: { type: steps_complete }, next_state: image_vq }

    image_vq:
      # 576 = 24 × 24 VQ grid.  vae_decode in inference mode samples from its
      # generation head AND looks up the codebook embedding in one call;
      # vae_decode_to_ar feeds that embedding back into the next iteration's
      # janus_llama call as inputs_embeds.
      body:
        - ar_to_vae_decode    # janus_llama  → vae_decode    (hidden_states)
        - vae_decode_to_ar    # vae_decode   → janus_llama   (embed → inputs_embeds)
      token_length: { type: fixed, value: 576 }
      transitions:
        - { condition: { type: steps_complete }, next_state: image_vq_end }

    image_vq_end:
      # Emit <end_of_image>, run AR once on it.  Mirrors image_vq_start.
      body:
        - emit_end_to_ar      # emit_image_end (eoi token) → janus_llama
        - emit_end_sink       # leaf
        - ar_run_sink         # leaf — triggers janus_llama
      token_length: { type: fixed, value: 1 }
      transitions:
        - { condition: { type: steps_complete }, next_state: text_ar }

    done:
      body: []
      token_length: { type: fixed, value: 0 }
      transitions: []
