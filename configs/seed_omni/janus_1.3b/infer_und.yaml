# Janus-1.3B inference ‚Äî image understanding (I2T / VQA).  Uni-directional;
# never emits an image mid-stream.
#
# V2 AR path: ``tok_ar_step`` monolithically decode‚Üíencode‚Üímerge on the
# conversation ``output`` workspace; token ids live in the text encoder cache.

generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - vision_to_llm
        - tokenc_to_llm
        - llm_to_text_ar
        - text_ar_sink
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }
        - { condition: { type: default }, next_state: text_ar }

    text_ar:
      body:
        - llm_to_text_ar
        - text_ar_sink
      transitions:
        - { condition: { type: module_signal, key: text_done }, next_state: done }
