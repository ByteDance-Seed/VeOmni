# Janus-1.3B inference — text-to-image only (no trailing text).
#
# Flow: prompt_encode → image_vq_start → image_vq (576 AR steps) →
# image_vq_end → done.  VQ ids live in the VQVAE private buffer; embeds
# accumulate in ``type=output`` items (``meta.phase=vq``) and are sealed
# to ``type=image`` at ``emit_image_end``.

generation_graph:
  initial: prompt_encode

  states:
    prompt_encode:
      body:
        - vision_to_llm
        - tokenc_to_llm
        - llm_run_sink
      transitions:
        - { condition: { type: default }, next_state: image_vq_start }

    image_vq_start:
      body:
        - emit_start_sink
      transitions:
        - { condition: { type: default }, next_state: image_vq }

    image_vq:
      body:
        - llm_to_vaegen
        - vaegen_to_llm
      transitions:
        - { condition: { type: module_signal, key: image_complete }, next_state: image_vq_end }

    image_vq_end:
      body:
        - emit_end_sink
      transitions:
        - { condition: { type: default }, next_state: done }
