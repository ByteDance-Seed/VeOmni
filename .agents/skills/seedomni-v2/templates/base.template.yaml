# <Model> SeedOmni V2 launcher.
#
# Replace all angle-bracket placeholders and compare with a live config such as
# configs/seed_omni/Janus/janus_1.3b/base.yaml before committing.

model:
  model_path: <split_checkpoint_root>
  modules: configs/seed_omni/<Model>/<variant>/modules_train.yaml
  train_graph: configs/seed_omni/<Model>/<variant>/graph_train.yaml
  ops_implementation:
    attn_implementation: flash_attention_2

accelerator:
  fsdp_config:
    fsdp_mode: fsdp2
    full_shard: true
    reshard_after_forward: true
    reshard_after_backward: true
    forward_prefetch: true
    offload: false
    mixed_precision:
      enable: true
      param_dtype: bfloat16
      reduce_dtype: float32

data:
  data_type: seedomni
  max_seq_len: 4096
  train_path: configs/seed_omni/<Model>/data.yaml
  datasets_type: iterable
  dataloader:
    type: native
    num_workers: 4
    drop_last: true
    pin_memory: true
    prefetch_factor: 2

train:
  seed: 42
  num_train_epochs: 1
  global_batch_size: 32
  micro_batch_size: 1
  init_device: meta
  dyn_bsz: false
  gradient_checkpointing:
    enable: true
    enable_reentrant: false
  optimizer:
    type: adamw
    lr: 1.0e-4
    lr_min: 1.0e-6
    lr_warmup_ratio: 0.03
    lr_decay_style: cosine
    weight_decay: 0.01
    max_grad_norm: 1.0
  checkpoint:
    output_dir: outputs/<model>_omni
    save_steps: 500
    save_hf_weights: true
    hf_save_steps: 500
  wandb:
    enable: false

infer:
  model_path: <split_checkpoint_root>
  modules: configs/seed_omni/<Model>/<variant>/modules_infer_eager.yaml
  infer_graph:
    infer_default: configs/seed_omni/<Model>/<variant>/graph_infer.yaml
  infer_type: infer_default
  generation_kwargs:
    max_new_tokens: 512
    temperature: 0.0
    top_p: 1.0
    do_sample: false
