name: NPU unit tests

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/npu_unit_tests.yml
      - .github/workflows/_test_runner_npu.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - .github/workflows/npu_unit_tests.yml
      - .github/workflows/_test_runner_npu.yml
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  unit:
    needs: lint
    uses: ./.github/workflows/_test_runner_npu.yml
    with:
      marker: unit
      transformers_variant: both
