# # Tests layout

name: NPU unit tests

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/npu_unit_tests.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - .github/workflows/npu_unit_tests.yml
      - "pyproject.toml"
      - "uv.lock"

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  npu_unit_tests:
    needs: lint
    if: github.repository_owner == 'ByteDance-Seed'
    name: VeOmni Ascend test (self-host)
    # Pick any free 8-card 910B slice (910b-0..5). See
    # github_runner/README.md for the full label scheme. Use
    # `[self-hosted, 910b-N]` if you need to pin to a specific runner, or
    # `[self-hosted, 910b-host-N]` to pin to a specific physical machine.
    runs-on: [self-hosted, 910b-8]
    timeout-minutes: 60 # Increase this timeout value as needed
    container:
      image: quay.io/ascend/veomni:veomni-8.3.rc2-910b-ubuntu22.04-py3.11-latest
      volumes:
        - /usr/local/dcmi:/usr/local/dcmi
        - /usr/local/bin/npu-smi:/usr/local/bin/npu-smi
        # Whole driver tree so CANN can find all .so's (libc_sec.so, ...).
        - /usr/local/Ascend/driver:/usr/local/Ascend/driver
        - /etc/ascend_install.info:/etc/ascend_install.info:ro
        - /data00/tiger/actions-runner_veomni/proxy/latest_proxy:/tmp/latest_proxy:ro
        # Shared CI asset mount (samples/models/datasets live under /data00/assets
        # on the host; see github_runner/group_vars/npu_nodes.yml).
        - /data00/assets:/data00/assets:ro
      options: >-
        --device /dev/davinci_manager
        --device /dev/devmm_svm
        --device /dev/hisi_hdc
        --device /dev/davinci0 --device /dev/davinci1 --device /dev/davinci2 --device /dev/davinci3
        --device /dev/davinci4 --device /dev/davinci5 --device /dev/davinci6 --device /dev/davinci7
        --device /dev/davinci8 --device /dev/davinci9 --device /dev/davinci10 --device /dev/davinci11
        --device /dev/davinci12 --device /dev/davinci13 --device /dev/davinci14 --device /dev/davinci15
        --shm-size 16g
    env:
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0" # This is more stable
      CI_SAMPLES_DIR: "/data00/assets/samples"

    steps:
      - name: Set ASCEND_VISIBLE_DEVICES from runner slice
        # $RUNNER_NAME is injected automatically by the GitHub Actions runner
        # and equals the `npu_runner_specs[*].name` from the ansible deploy
        # (910b-0, 910b-1, ..., 910b-5). Even-suffix slices own cards 0-7,
        # odd-suffix slices own cards 8-15. See github_runner/README.md.
        run: |
          case "$RUNNER_NAME" in
            910b-*)
              slice_num="${RUNNER_NAME#910b-}"
              if [ "$((slice_num % 2))" -eq 0 ]; then
                cards="0,1,2,3,4,5,6,7"
              else
                cards="8,9,10,11,12,13,14,15"
              fi
              ;;
            *)
              echo "Unexpected RUNNER_NAME=$RUNNER_NAME; falling back to first 8 cards" >&2
              cards="0,1,2,3,4,5,6,7"
              ;;
          esac
          echo "ASCEND_VISIBLE_DEVICES=$cards" >> "$GITHUB_ENV"
          echo "ASCEND_RT_VISIBLE_DEVICES=$cards" >> "$GITHUB_ENV"
          echo "Runner $RUNNER_NAME -> ASCEND_VISIBLE_DEVICES=$cards"
      - name: Set up proxy
        run: |
          CURRENT_PROXY=$(cat /tmp/latest_proxy)
          echo "HTTP_PROXY=$CURRENT_PROXY" >> $GITHUB_ENV
          echo "HTTPS_PROXY=$CURRENT_PROXY" >> $GITHUB_ENV
          echo "http_proxy=$CURRENT_PROXY" >> $GITHUB_ENV
          echo "https_proxy=$CURRENT_PROXY" >> $GITHUB_ENV
      - name: Check npu and CANN info
        run: |
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info
          npu-smi info
      - name: Check initial pip list from image
        run: |
          pip list
      - name: Checkout ByteDance-Seed/VeOmni repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
      - name: Sync dependencies
        run: |
          uv sync --frozen --python 3.11 --extra npu --extra audio --group dev
      - name: Check final pip list
        run: |
          uv pip list
      - name: Run parallel tests
        run: |
          uv run --frozen pytest -v -s -x tests/parallel/ulysses/test_ulysses.py
          uv run --frozen pytest -v -s -x tests/parallel/ulysses/test_all_gather.py
          uv run --frozen pytest -v -s -x tests/parallel/ulysses/test_slice_input_tensor.py
          uv run --frozen pytest -v -s -x tests/parallel/encoder_data_balance/test_balance_reverse.py
          uv run --frozen pytest -v -s -x tests/parallel/encoder_data_balance/test_balance_sorting_algo.py
      - name: Run models tests
        run: |
          uv run --frozen pytest -v -s -x tests/models/test_model_registry.py
          uv run --frozen pytest -v -s -x tests/models/test_models_patch.py
          uv run --frozen pytest -v -s -x tests/models/test_padded_packed_loss.py
      - name: Run fsdp2/extra_parallel+fsdp2 (e.g. ep+fsdp2, mb+fsdp2, ep+emb+fsdp2) clip grad norm test
        run: |
          uv run --frozen pytest -v -s -x tests/utils/test_extra_parallel_clip_grad_norm.py
      - name: Run checkpoint callback unit tests
        run: |
          uv run --frozen pytest -v -s -x tests/checkpoints/test_checkpoint_callback.py
      - name: Run e2e dcp save and load test
        run: |
          uv run --frozen pytest -v -s -x tests/checkpoints/test_trainer_saveload.py
      - name: Run distributed tests (dummy_forward)
        run: |
          uv run --frozen pytest -v -s -x tests/distributed/test_dummy_forward.py
      - name: Run data tests
        run: |
          uv run --frozen pytest -v -s -x tests/data
      - name: Run ops tests
        run: |
          uv run --frozen pytest -v -s -x tests/ops/test_comp.py
          uv run --frozen pytest -v -s -x tests/ops/test_moe_hw_gate.py
      - name: Sync dependencies [transformers-v5]
        run: |
          uv sync --frozen --python 3.11 --no-group transformers-stable --extra transformers5-exp --extra npu --extra audio --group dev
      - name: Run models tests [transformers-v5]
        run: |
          uv run  --frozen pytest -v -s -x tests/models/test_model_registry.py
          uv run --frozen pytest -v -s -x tests/models/test_models_patch.py
          uv run --frozen pytest -v -s -x tests/models/test_vlm_trainer.py
      - name: Run Qwen3.5 GatedDeltaNet Ulysses SP tests [transformers-v5]
        if: steps.changes.outputs.qwen3_5_ulysses == 'true'
        run: |
          uv run --frozen pytest -v -s -x tests/parallel/ulysses/test_qwen3_5_gated_deltanet_ulysses.py
      - name: Run utils tests [transformers-v5]
        run: |
          # Need v5 to support newer models like Qwen3.5 count flops tests.
          uv run --frozen --no-group transformers-stable --extra transformers5-exp pytest -v -s -x tests/utils/test_count_flops.py
