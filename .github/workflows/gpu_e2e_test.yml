name: GPU e2e tests

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - .github/workflows/_test_runner_gpu.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - .github/workflows/_test_runner_gpu.yml
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  e2e:
    needs: lint
    uses: ./.github/workflows/_test_runner_gpu.yml
    with:
      marker: e2e
      transformers_variant: both
      # Extra leg that re-syncs with `--extra dit` and runs the DiT-only
      # parallel-alignment test. Only gpu_e2e needs this today.
      run_dit_step: true
