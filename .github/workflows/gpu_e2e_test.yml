# # Tests layout

name: GPU e2e tests

on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - .github/workflows/gpu_e2e_test.yml
      - "pyproject.toml"
      - "uv.lock"

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_03_py3_cuda12_9"
  NCCL_DEBUG: "WARN"
  # uv's default 30s timeout is too short for the ~617 MiB
  # nvidia-cudnn-cu12 wheel on the CN runners; bump to 5 min so a
  # transient slow link doesn't fail the whole sync.
  UV_HTTP_TIMEOUT: "300"
  # qwen3_5's full 248K vocab embedding fragments the PyTorch allocator
  # on the L20 (9+ GiB ends up reserved-but-unallocated, OOMing the
  # next 2.4 GiB request). Expandable segments coalesce the free
  # blocks so the toy e2e fits the 44 GiB card.
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  # Disable UCX's signal-handler chain — see gpu_unit_tests.yml for
  # rationale (NCCL's RDMA plugin pulls in libucs, whose SIGSEGV
  # handler trips libnvidia-ptxjitcompiler.so.1 on rank teardown).
  UCX_HANDLE_ERRORS: "none"

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  # gpu_e2e_tests_v4 and gpu_e2e_tests_v5 run in parallel on separate l20-8
  # runners. They share identical runner/container/env config; only the
  # dependency sync (transformers-v4-legacy extra vs. default v5) and the test
  # set differ. Keep the two jobs in sync when modifying shared parts.

  gpu_e2e_tests_v4:
    if: github.repository_owner == 'ByteDance-Seed'
    needs: lint
    # Self-hosted L20-8 fleet managed by github_runner/ (ansible). See
    # github_runner/README.md for the full label scheme.
    runs-on: [self-hosted, l20-8]
    timeout-minutes: 90
    container:
      image: verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_03_py3_cuda12_9
      volumes:
        # Shared CI asset NFS (see gpu_unit_tests.yml for details).
        - /mnt/veomni_ci:/mnt/veomni_ci:ro
      options: >-
        --gpus all
        --ipc host
        --shm-size 32g
    env:
      # hf-mirror is a safety net; actual model data should come from the NFS
      # share via CI_HF_MODELS_DIR (see tests/tools/__init__::hf_local_or_remote).
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0" # hf-mirror does not support hf_transfer
      NCCL_DEBUG: "WARN"
      # Shared NFS paths (see workflow container.volumes above).
      CI_HF_MODELS_DIR: "/mnt/veomni_ci/models"
      CI_SAMPLES_DIR: "/mnt/veomni_ci/datasets/custom_data/samples"
      CI_DATASET_DIR: "/mnt/veomni_ci/datasets"
      # Pin the v4-legacy env: the explicit `uv sync` below installs
      # transformers==4.57.3 via the legacy extra; `UV_NO_SYNC` tells every
      # subsequent `uv run` to use the venv as-is instead of re-syncing
      # back to the project default (which is now v5 after this PR).
      UV_NO_SYNC: "1"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Free shared L20 GPU
        # Some prior CI runs on this physical host leak Python/torchrun
        # processes that keep tens of GiB pinned on the GPUs even after
        # their sibling container exits. Without this kill step the next
        # job lands on the same physical host and OOMs at the first
        # large allocation. Safe here: L20-8 self-hosted runners are
        # 1-job-per-physical-host and ``--gpus all`` claims the whole card.
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Sync dependencies [transformers-v4-legacy]
        run: |
          uv sync --frozen --no-group transformers-stable --extra transformers-v4-legacy --extra gpu --extra audio --group dev
      - name: Run e2e training test
        run: |
          uv run --frozen pytest -s -x tests/e2e/test_e2e_parallel.py
      - name: Free GPUs between test steps
        # See v5 job for rationale — kill any pytest/torchrun workers
        # that outlived the previous pytest session before starting the
        # next test step.
        if: always()
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Run FSDP equivalence tests
        run: |
          uv run --frozen pytest -s -x tests/distributed/test_fsdp_equivalence.py
      - name: Sync dependencies [diffusers, transformers-v4-legacy]
        run: |
          uv sync --frozen --no-group transformers-stable --extra transformers-v4-legacy --extra gpu --extra dit --group dev
      - name: Run tests [diffusers]
        run: |
          uv run --frozen pytest -s -x tests/e2e/test_e2e_parallel.py::test_wan_dit_parallel_align

  gpu_e2e_tests_v5:
    if: github.repository_owner == 'ByteDance-Seed'
    needs: lint
    # Same runner/container/env as gpu_e2e_tests_v4 above; see comments there.
    runs-on: [self-hosted, l20-8]
    timeout-minutes: 90
    container:
      image: verl-ci-cn-beijing.cr.volces.com/veomni/open_veomni-gpu:pytorch_25_03_py3_cuda12_9
      volumes:
        - /mnt/veomni_ci:/mnt/veomni_ci:ro
      options: >-
        --gpus all
        --ipc host
        --shm-size 32g
    env:
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      NCCL_DEBUG: "WARN"
      CI_HF_MODELS_DIR: "/mnt/veomni_ci/models"
      CI_SAMPLES_DIR: "/mnt/veomni_ci/datasets/custom_data/samples"
      CI_DATASET_DIR: "/mnt/veomni_ci/datasets"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Free shared L20 GPU
        # See gpu_e2e_tests_v4 for rationale — kill leftover GPU
        # processes from prior CI runs that share this physical host.
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Sync dependencies
        run: |
          uv sync --frozen --extra gpu --extra audio --group dev
      - name: Run e2e tests
        # TODO: also run these tests on the legacy v4 path (currently effectively
        # skipped there — not straightforward to enable due to L20 OOM).
        run: |
          uv run --frozen pytest -s -x tests/e2e/test_e2e_parallel.py
      - name: Free GPUs between test steps
        # pytest's mp.spawn / torchrun workers sometimes outlive the pytest
        # session — they hold tens of GiB on GPU 0 and OOM the next test.
        # Sweep again between test steps; the job-start cleanup alone
        # isn't enough.
        if: always()
        run: |
          nvidia-smi || true
          pids=$(nvidia-smi --query-compute-apps=pid --format=csv,noheader,nounits 2>/dev/null | sort -u | tr '\n' ' ')
          if [ -n "$pids" ]; then
            echo "Killing stale GPU processes: $pids"
            kill -9 $pids 2>/dev/null || true
            sleep 3
            nvidia-smi || true
          fi
      - name: Run FSDP equivalence tests
        run: |
          uv run --frozen pytest -s -x tests/distributed/test_fsdp_equivalence.py
      # TODO: also run the remaining tests on the legacy v4 path.
