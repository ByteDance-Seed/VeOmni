name: GPU unit tests

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "**/*.py"
      - .github/workflows/gpu_unit_tests.yml
      - .github/workflows/_test_runner_gpu.yml
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.py"
      - .github/workflows/gpu_unit_tests.yml
      - .github/workflows/_test_runner_gpu.yml
      - "pyproject.toml"
      - "uv.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/check_pr_lint.yml

  unit:
    needs: lint
    uses: ./.github/workflows/_test_runner_gpu.yml
    with:
      marker: unit
      # `both` runs the unit selection once under transformers-stable and
      # once under the v5 experimental extras. Flip to `v5` once v4 is
      # fully deprecated; the stable-branch steps in _test_runner_gpu
      # will then no-op and can be deleted.
      transformers_variant: both
